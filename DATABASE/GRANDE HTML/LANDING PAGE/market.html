            /* ─── REGISTER UNIVERSITY ────────────────────────────── */
            const RegisterUniversity = ({user, setUser, onNavigate}) => {
              const [step, setStep] = useState(0);
              const [form, setForm] = useState({
                uniName:       user.uniName       || '',
                country:       user.country       || '',
                website:       user.website       || '',
                programs:      user.programs      || '',
                intakePeriods: user.intakePeriods || '',
                logo:          null,
                accreditation: null,
              });
              const [errors, setErrors] = useState({});
              const [saving, setSaving] = useState(false);

              const set = (k,v) => {
                setForm(p=>({...p,[k]:v}));
                setErrors(p=>({...p,[k]:'', general:''}));
              };
              const steps = ['Institution','Programs','Documents'];

              const validateStep = () => {
                const e = {};
                if(step===0){
                  if(!form.uniName.trim()) e.uniName='Required';
                  if(!form.country.trim()) e.country='Required';
                }
                if(step===1){ if(!form.programs.trim()) e.programs='Required'; }
                return e;
              };

              const next = () => {
                const e = validateStep();
                if(Object.keys(e).length){ setErrors(e); return; }
                if(step<2) setStep(s=>s+1);
                else finish();
              };

              const finish = () => {
                const e = validateStep();
                if(Object.keys(e).length){ setErrors(e); return; }

                setErrors({});
                setSaving(true);
                
                // ✅ LOCAL STORAGE: Save university profile
                setTimeout(() => {
                  const updated = {
                    uniName: form.uniName,
                    country: form.country,
                    website: form.website,
                    programs: form.programs,
                    intakePeriods: form.intakePeriods,
                    description: form.description || '',
                    verified: 'pending',
                  };
                  window.BALocalStorage.saveUser({ ...window.BALocalStorage.getUser(), ...updated });
                  setUser(prev => ({ ...prev, ...form, profile: updated, verified: 'pending' }));
                  onNavigate('/profile/university');
                  setSaving(false);
                }, 400);
              };

              return (
                <div style={{minHeight:'100vh',background:
                  'radial-gradient(ellipse at 30% 70%, rgba(26,86,219,.08) 0%, transparent 60%), #07111f',
                  paddingTop:80}}>
                  <TopBar onLogo={()=>onNavigate('/signup')} currentPath="/register/university"/>

                  <div style={{maxWidth:940,margin:'0 auto',padding:'40px 20px',
                    display:'grid',gridTemplateColumns:'220px 1fr',gap:28}}>

                    <div style={{position:'sticky',top:80,height:'fit-content'}}>
                      <div className="glass-card" style={{borderRadius:18,padding:24}}>
                        <div className="section-pill" style={{fontSize:9,marginBottom:20}}>
                          <i className="fa-solid fa-university"/> University
                        </div>
                        <div style={{display:'flex',flexDirection:'column',gap:8}}>
                          {steps.map((s,i)=>(
                            <div key={i} style={{display:'flex',alignItems:'center',gap:12,cursor:'pointer'}}
                              onClick={()=>{ if(i<step) setStep(i); }}>
                              <div className={`step-dot ${i<step?'done':i===step?'active':'pending'}`}>
                                {i<step?<i className="fa-solid fa-check" style={{fontSize:11}}/>:i+1}
                              </div>
                              <span style={{fontSize:13,fontWeight:i===step?600:400,
                                color:i===step?'#f0f4ff':i<step?'#4ade80':'#3d5a80'}}>{s}</span>
                            </div>
                          ))}
                        </div>
                        <div className="ba-divider"/>
                        <p style={{fontSize:11,color:'#3d5a80',lineHeight:1.7}}>
                          All partner institutions undergo a verification process before going live.
                        </p>
                      </div>
                    </div>

                    {/* FORM */}
                    <div className="glass-card page-enter" style={{borderRadius:20,padding:'32px 28px'}}>
                      {errors.general && (
                        <div className="ba-error" style={{marginBottom:12}}>
                          {errors.general}
                        </div>
                      )}
                      <h2 style={{fontFamily:"'Sora',sans-serif",fontWeight:700,fontSize:22,marginBottom:4}}>
                        {steps[step]}
                      </h2>
                      <p style={{color:'#64748b',fontSize:13,marginBottom:28}}>
                        Step {step+1} of {steps.length}
                      </p>

                      {step===0 && (
                        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:18}}>
                          <div style={{gridColumn:'1/-1'}}>
                            <label className="ba-label">University Name</label>
                            <input className="ba-input" placeholder="e.g. California ETCE University"
                              value={form.uniName} onChange={e=>set('uniName',e.target.value)}/>
                            {errors.uniName && <div className="ba-error">{errors.uniName}</div>}
                          </div>
                          <div>
                            <label className="ba-label">Country</label>
                            <input className="ba-input" placeholder="United States"
                              value={form.country} onChange={e=>set('country',e.target.value)}/>
                            {errors.country && <div className="ba-error">{errors.country}</div>}
                          </div>
                          <div>
                            <label className="ba-label">Website</label>
                            <input className="ba-input" placeholder="https://university.edu"
                              value={form.website} onChange={e=>set('website',e.target.value)}/>
                          </div>
                        </div>
                      )}

                      {step===1 && (
                        <div style={{display:'grid',gap:18}}>
                          <div>
                            <label className="ba-label">Programs Offered</label>
                            <textarea className="ba-input" rows={5}
                              placeholder="List your programs, one per line..."
                              value={form.programs} onChange={e=>set('programs',e.target.value)}

                            {errors.programs && <div className="ba-error">{errors.programs}</div>}
                          </div>
                          <div>
                            <label className="ba-label">Intake Periods</label>
                            <select className="ba-input"
                              value={form.intakePeriods} onChange={e=>set('intakePeriods',e.target.value)}>
                              <option value="">Select primary intake...</option>
                              <option>Fall & Spring</option>
                              <option>Fall only</option>
                              <option>Spring only</option>
                              <option>Rolling admissions</option>
                            </select>
                          </div>
                        </div>
                      )}

                      {step===2 && (
                        <div style={{display:'grid',gap:20}}>
                          <p style={{color:'#64748b',fontSize:13}}>
                            <i className="fa-solid fa-circle-info mr-2" style={{color:'#3b82f6'}}/>
                            Documents help verify your institution. You can upload later.
                          </p>
                          {[
                            {key:'logo',label:'University Logo',icon:'fa-image'},
                            {key:'accreditation',label:'Accreditation Certificate',icon:'fa-certificate'},

                            <div key={doc.key} className="upload-zone"
                              onClick={()=>set(doc.key,`${doc.label} uploaded`)}>
                              <i className={`fa-solid ${doc.icon}`}
                                style={{fontSize:28,color:form[doc.key]?'#4ade80':'#3d5a80',marginBottom:10}}/>
                              <div style={{fontWeight:600,fontSize:14,marginBottom:4,
                                color:form[doc.key]?'#4ade80':'#f0f4ff'}}>
                                {form[doc.key]?'✓ '+doc.label:doc.label}
                              </div>
                              <div style={{fontSize:12,color:'#3d5a80'}}>
                                {form[doc.key]?'File ready':'Click to upload'}
                              </div>
                            </div>
                          ))}
                        </div>
                      )}

                      <div style={{display:'flex',justifyContent:'space-between',marginTop:36}}>
                        <button className="ba-btn ba-btn-ghost"
                          onClick={()=>step>0?setStep(s=>s-1):onNavigate('/signup')}

                          <i className="fa-solid fa-arrow-left"/> {step===0?'Back':'Previous'}
                        </button>
                        <div style={{display:'flex',gap:10}}>

                            <button className="ba-btn ba-btn-ghost" onClick={finish}

                          )}
                          <button className="ba-btn ba-btn-primary" onClick={next} disabled={saving}>
                            {saving ? 'Saving...' : (step===2?'Create University Profile':'Next Step')}
                            <i className="fa-solid fa-arrow-right"/>
                          </button>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>
              );
            };

            /* ─── MARKETPLACE VIEW ───────────────────────────────── */
            const MarketplaceView = ({user, onNavigate}) => {

              const [dataset, setDataset] = useState([]);
              const [loadingData, setLoadingData] = useState(true);

              useEffect(() => {
                setLoadingData(true);
                // ✅ LOCAL STORAGE: Use mock marketplace data
                setTimeout(() => {
                  const live = isStudent
                    ? window.BALocalStorage.getMockUniversities().map(normalizeUniversityMarketplaceItem)
                    : window.BALocalStorage.getMockStudents().map(normalizeStudentMarketplaceItem);
                  setDataset(live);
                  setLoadingData(false);
                }, 400);
              }, [isStudent]);

              const [search,    setSearch]  = useState('');
              const [sortBy,    setSortBy]  = useState('match');
              const [filters,   setFilters] = useState({});
              const [drawer,    setDrawer]  = useState(null);
              const [saved,     setSaved]   = useState(new Set());

              const [viewMode,  setViewMode] = useState('grid'); // 'grid' | 'list'

              /* ── Filter options ─────────────────────────────────── */
              const filterDefs = isStudent ? [
                {key:'country', label:'Country',   options:['United Kingdom','Canada','Germany','Singapore','Switzerland','France','Australia','Netherlands','Ireland','South Africa','Japan']},
                {key:'type',    label:'Type',      options:['Public','Private']},
                {key:'intake',  label:'Intake',    options:['Sept only','Sept & Jan','Oct & Apr','Mar & Jul','Apr & Sept','Jan, Apr, Sept, Nov','Feb & Sept','Feb only','Aug only']},
              ] : [
                {key:'nationality', label:'Nationality', options:['Cameroonian','Indian','Nigerian','Ghanaian','Moroccan','Brazilian','Senegalese','Kenyan','Romanian','Beninese']},
                {key:'major',       label:'Major',       options:['Computer Science','Business Analytics','Mechanical Engineering','Medicine & Surgery','Economics','Architecture','Data Science','International Relations','Finance','Public Health','Environmental Science','Psychology']},
                {key:'budget',      label:'Budget',      options:['$10k–$20k','$20k–$35k','$35k–$50k','$50k+']},
                {key:'verified',    label:'Status',      options:['Verified','Pending Docs']},
              ];

              const toggleFilter = (key, val) => {
                setFilters(prev => {
                  const cur = prev[key] || [];
                  const next = cur.includes(val) ? cur.filter(v=>v!==val) : [...cur, val];
                  return {...prev, [key]: next};
                });
              };
              const clearFilters = () => setFilters({});

              /* ── Filtering logic ────────────────────────────────── */
              const filtered = dataset.filter(item => {
                const q = search.toLowerCase();
                const matchesSearch = !q || (
                  item.name.toLowerCase().includes(q) ||
                  (isStudent
                    ? (item.country||'').toLowerCase().includes(q) || (Array.isArray(item.programs) ? item.programs : []).some(p=>p.toLowerCase().includes(q))
                    : (item.nationality||'').toLowerCase().includes(q) || (item.major||'').toLowerCase().includes(q))
                );
                if(!matchesSearch) return false;

                for(const [key, vals] of Object.entries(filters)) {
                  if(!vals || vals.length===0) continue;
                  let itemVal;
                  if(key==='verified') itemVal = item.verified ? 'Verified' : 'Pending Docs';
                  else itemVal = item[key];
                  if(!vals.includes(itemVal)) return false;
                }
                return true;
              }).sort((a,b)=>{
                if(sortBy==='match')  return b.match  - a.match;
                if(sortBy==='name')   return a.name.localeCompare(b.name);
                if(sortBy==='gpa' && !isStudent) return 0;
                if(sortBy==='gpa')    return b.gpa - a.gpa;
                if(sortBy==='rank')   return a.id - b.id;
                return 0;
              });

              const activeFilterCount = Object.values(filters).reduce((n,v)=>n+(v?v.length:0),0);

              /* ── MatchBar mini component ────────────────────────── */

                      setPath(role === 'university' ? '/profile/university' : '/profile/student');
                    } else {
                      setPath(role === 'university' ? '/register/university' : '/register/student');
                    }
                  } else {
                    const storedRole = sessionStorage.getItem('ba_role');
                    if (storedRole) {
                      setUser(prev => ({...prev, role: storedRole}));
                      sessionStorage.removeItem('ba_role');
                      setPath(storedRole === 'university' ? '/register/university' : '/register/student');
                    }
                  }
                  setLoading(false);
                }, 400);
              }, []);

              useEffect(() => {
                const syncHashRoute = () => {
                  if (window.location.hash === '#intake') {
                    setPath('/intake');
                  } else if (path === '/intake') {
                    setPath('/signup');
                  }
                };

                window.addEventListener('hashchange', syncHashRoute);
                return () => window.removeEventListener('hashchange', syncHashRoute);
              }, [path]);

              const handleLogout = () => {
                // ✅ LOCAL STORAGE: Logout by clearing user
                window.BALocalStorage.logout();
                setUser({role:'student'});
                setPath('/signup');
              };

              const navigate = (p) => {
                if (p === '/logout') { handleLogout(); return; }
                setPath(p);
              };

              if (loading) return (
                <div style={{minHeight:'100vh',display:'flex',alignItems:'center',justifyContent:'center',
                  background:'#07111f',color:'#94a3b8',fontFamily:'Inter,sans-serif',fontSize:14}}>
                  Loading...
                </div>
              );

              return (
                <>
                  {path === '/intake' &&
                    <IntakeDashboard/>}
                  {path === '/signup' &&
                    <SignupView onNavigate={navigate} setUser={setUser}/>}
                  {path === '/register/student' &&
                    <RegisterStudent user={user} setUser={setUser} onNavigate={navigate}/>}
                  {path === '/register/university' &&
                    <RegisterUniversity user={user} setUser={setUser} onNavigate={navigate}/>}
                  {path === '/profile/student' &&
                    <StudentProfile user={user} setUser={setUser} onNavigate={navigate}/>}
                  {path === '/profile/university' &&
                    <UniversityProfile user={user} setUser={setUser} onNavigate={navigate}/>}
                  {path === '/marketplace' &&
                    <MarketplaceView user={user} onNavigate={navigate}/>}
                </>
              );
            };

            ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
        </script>
    </body>
</html>
