<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>BetterAbroad — Verified Student Platform</title>

        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&family=Inter:wght@300;400;500;600;700&display=swap"
            rel="stylesheet"
        />
        <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" />

        <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
        <script src="https://cdn.tailwindcss.com"></script>

        <script>
            // ===== LOCAL STORAGE API (No Backend) =====
            window.BALocalStorage = {
              // User & Auth
              saveUser: (user) => localStorage.setItem('ba_user', JSON.stringify(user)),
              getUser: () => {
                try { return JSON.parse(localStorage.getItem('ba_user') || null); } catch { return null; }
              },
              logout: () => localStorage.removeItem('ba_user'),

              // Applications
              saveApplication: (app) => {
                const apps = window.BALocalStorage.getApplications();
                const idx = apps.findIndex(a => a.id === app.id);
                if (idx >= 0) apps[idx] = app;
                else app.id = Date.now() + Math.random(), apps.push(app);
                localStorage.setItem('ba_applications', JSON.stringify(apps));
                return app;
              },
              getApplications: () => {
                try { return JSON.parse(localStorage.getItem('ba_applications') || '[]'); } catch { return []; }
              },
              saveApplications: (apps) => localStorage.setItem('ba_applications', JSON.stringify(apps)),

              // Documents
              saveDocuments: (docs) => localStorage.setItem('ba_documents', JSON.stringify(docs)),
              getDocuments: () => {
                try { return JSON.parse(localStorage.getItem('ba_documents') || '{}'); } catch { return {}; }
              },

              // Notifications
              getNotifications: () => {
                try { return JSON.parse(localStorage.getItem('ba_notifications') || '[]'); } catch { return []; }
              },
              saveNotifications: (notifs) => localStorage.setItem('ba_notifications', JSON.stringify(notifs)),

              // Seminars
              getSeminars: () => {
                try { return JSON.parse(localStorage.getItem('ba_seminars') || '[]'); } catch { return []; }
              },
              saveSeminars: (seminars) => localStorage.setItem('ba_seminars', JSON.stringify(seminars)),

              // Mock data generators
              getMockUniversities: () => [
                { id: 1, name: 'MIT', country: 'United States', flag: '🇺🇸', programs: ['Computer Science', 'Mechanical Engineering', 'Data Science'], tuition: '$60,000/yr', accredited: true, verified: true, rank: '#1', intake: 'Fall & Spring', website: 'https://mit.edu', applicationCount: 2847, type: 'Private', match: 92, description: 'Leading institute of technology in the world.' },
                { id: 2, name: 'Oxford University', country: 'United Kingdom', flag: '🇬🇧', programs: ['Law', 'Medicine', 'Philosophy'], tuition: 'From £12,000/yr', accredited: true, verified: true, rank: '#2', intake: 'October only', website: 'https://oxford.ac.uk', applicationCount: 3542, type: 'Public', match: 88, description: 'Historic university with world-class education.' },
                { id: 3, name: 'Stanford', country: 'United States', flag: '🇺🇸', programs: ['Business', 'Engineering', 'AI & ML'], tuition: '$59,000/yr', accredited: true, verified: true, rank: '#3', intake: 'Fall & Spring', website: 'https://stanford.edu', applicationCount: 2105, type: 'Private', match: 85, description: 'Silicon Valley tech university.' },
                { id: 4, name: 'University of Toronto', country: 'Canada', flag: '🇨🇦', programs: ['Engineering', 'Medicine', 'Business'], tuition: 'CAD $30,000–50,000/yr', accredited: true, verified: true, rank: '#18', intake: 'Sept & Jan', website: 'https://utoronto.ca', applicationCount: 1832, type: 'Public', match: 82, description: 'Canada\'s leading research university.' },
                { id: 5, name: 'ANU', country: 'Australia', flag: '🇦🇺', programs: ['Science', 'Arts', 'Engineering'], tuition: 'AUD $25,000–40,000/yr', accredited: true, verified: true, rank: '#30', intake: 'Feb & July', website: 'https://anu.edu.au', applicationCount: 1564, type: 'Public', match: 78, description: 'Australia\'s premier research university.' },
                { id: 6, name: 'ETH Zurich', country: 'Switzerland', flag: '🇨🇭', programs: ['Engineering', 'Physics', 'Mathematics'], tuition: 'CHF 730/semester', accredited: true, verified: true, rank: '#5', intake: 'Sept & Feb', website: 'https://ethz.ch', applicationCount: 892, type: 'Public', match: 81, description: 'Swiss Federal technical university.' },
              ],
              getMockStudents: () => [
                { id: 101, name: 'Amara Nkomo', nationality: 'South African', flag: '🇿🇦', gpa: 3.92, major: 'Computer Science', budget: '$35,000–50,000', intake: 'Fall 2025', age: 22, verified: true, match: 87, completion_pct: 95, status: 'Profile Ready', description: 'Passionate about AI and innovation.' },
                { id: 102, name: 'Yuki Tanaka', nationality: 'Japanese', flag: '🇯🇵', gpa: 3.78, major: 'Mechanical Engineering', budget: '$50,000+', intake: 'Spring 2026', age: 21, verified: true, match: 84, completion_pct: 88, status: 'Profile Ready', description: 'Interested in robotics and automation.' },
                { id: 103, name: 'Chinedu Okafor', nationality: 'Nigerian', flag: '🇳🇬', gpa: 3.65, major: 'Business Analytics', budget: '$20,000–35,000', intake: 'Fall 2025', age: 23, verified: true, match: 81, completion_pct: 82, status: 'Profile Ready', description: 'Data-driven decision maker.' },
                { id: 104, name: 'Sofia Garcia', nationality: 'Brazilian', flag: '🇧🇷', gpa: 3.88, major: 'Medicine', budget: '$35,000–50,000', intake: 'Spring 2026', age: 24, verified: false, match: 76, completion_pct: 72, status: 'Pending review', description: 'Future healthcare leader.' },
                { id: 105, name: 'Aisha Patel', nationality: 'Indian', flag: '🇮🇳', gpa: 3.95, major: 'Data Science', budget: '$20,000–35,000', intake: 'Fall 2025', age: 20, verified: true, match: 89, completion_pct: 98, status: 'Profile Ready', description: 'ML enthusiast.' },
              ],
            };
        </script>

        <style>
            :root {
                --navy: #07111f;
                --navy-2: #0a1830;
                --navy-3: #0d2040;
                --blue: #1a56db;
                --blue-light: #3b82f6;
                --teal: #06b6d4;
                --crimson: #e02441;
                --text-hi: #f0f4ff;
                --text-mid: #94a3b8;
                --text-lo: #3d5a80;
                --glass: rgba(255, 255, 255, 0.04);
                --glass-border: rgba(255, 255, 255, 0.09);
                --blue-border: rgba(59, 130, 246, 0.3);
            }

            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            html {
                scroll-behavior: smooth;
            }
            body {
                font-family: "Inter", sans-serif;
                background: var(--navy);
                color: var(--text-hi);
                min-height: 100vh;
                overflow-x: hidden;
            }
            ::-webkit-scrollbar {
                width: 5px;
            }
            ::-webkit-scrollbar-track {
                background: var(--navy);
            }
            ::-webkit-scrollbar-thumb {
                background: var(--blue);
                border-radius: 10px;
            }

            /* Animations */
            @keyframes fadeUp {
                from {
                    opacity: 0;
                    transform: translateY(24px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }
            @keyframes fadeIn {
                from {
                    opacity: 0;
                }
                to {
                    opacity: 1;
                }
            }
            @keyframes slideLeft {
                from {
                    opacity: 0;
                    transform: translateX(-24px);
                }
                to {
                    opacity: 1;
                    transform: translateX(0);
                }
            }
            @keyframes pulse {
                0%,
                100% {
                    opacity: 1;
                }
                50% {
                    opacity: 0.5;
                }
            }
            @keyframes spin {
                to {
                    stroke-dashoffset: 0;
                }
            }
            @keyframes gradShift {
                0% {
                    background-position: 0% 50%;
                }
                50% {
                    background-position: 100% 50%;
                }
                100% {
                    background-position: 0% 50%;
                }
            }
            @keyframes shimmer {
                from {
                    background-position: -400px 0;
                }
                to {
                    background-position: 400px 0;
                }
            }
            @keyframes floatY {
                0%,
                100% {
                    transform: translateY(0);
                }
                50% {
                    transform: translateY(-8px);
                }
            }
            @keyframes slideDrawer {
                from {
                    transform: translateX(100%);
                    opacity: 0;
                }
                to {
                    transform: translateX(0);
                    opacity: 1;
                }
            }

            /* Laser Scanner Animations */
            @keyframes laserScan {
                0% {
                    top: 0%;
                    opacity: 0.8;
                }
                50% {
                    opacity: 1;
                }
                100% {
                    top: 100%;
                    opacity: 0.8;
                }
            }

            @keyframes laserGlow {
                0%, 100% {
                    box-shadow: 0 0 8px #06b6d4, 0 0 16px rgba(6, 182, 212, 0.5);
                }
                50% {
                    box-shadow: 0 0 16px #06b6d4, 0 0 32px rgba(6, 182, 212, 0.7);
                }
            }

            @keyframes pulseVerified {
                0% {
                    opacity: 0;
                    transform: scale(0.8);
                }
                50% {
                    opacity: 1;
                }
                100% {
                    opacity: 1;
                    transform: scale(1);
                }
            }

            @keyframes successCheckmark {
                0% {
                    stroke-dashoffset: 24;
                }
                100% {
                    stroke-dashoffset: 0;
                }
            }

            .laser-line {
                position: absolute;
                width: 100%;
                height: 3px;
                background: linear-gradient(90deg, transparent, #06b6d4, transparent);
                animation: laserScan 2s ease-in-out infinite;
            }

            .laser-line.glow {
                animation: laserScan 2s ease-in-out infinite, laserGlow 2s ease-in-out infinite;
            }

            .page-enter {
                animation: fadeUp 0.45s cubic-bezier(0.16, 1, 0.3, 1) both;
            }
            .slide-enter {
                animation: slideLeft 0.4s cubic-bezier(0.16, 1, 0.3, 1) both;
            }

            /* Glassmorphism card */
            .glass-card {
                background: rgba(255, 255, 255, 0.035);
                border: 1px solid var(--glass-border);
                backdrop-filter: blur(16px);
                -webkit-backdrop-filter: blur(16px);
            }

            /* Gradient text */
            .grad-text {
                background: linear-gradient(90deg, #3b82f6, #06b6d4);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
                background-clip: text;
            }

            /* Input styles */
            .ba-input {
                width: 100%;
                background: rgba(255, 255, 255, 0.05);
                border: 1px solid rgba(255, 255, 255, 0.1);
                color: var(--text-hi);
                padding: 11px 14px;
                border-radius: 10px;
                font-family: "Inter", sans-serif;
                font-size: 14px;
                outline: none;
                transition:
                    border-color 0.2s,
                    background 0.2s;
            }
            .ba-input:focus {
                border-color: var(--blue-light);
                background: rgba(59, 130, 246, 0.08);
            }
            .ba-input::placeholder {
                color: var(--text-lo);
            }
            .ba-input option {
                background: #0d2040;
                color: var(--text-hi);
            }

            /* Label */
            .ba-label {
                display: block;
                font-size: 12px;
                font-weight: 600;
                letter-spacing: 0.5px;
                color: var(--text-mid);
                margin-bottom: 6px;
                text-transform: uppercase;
            }

            /* Btn */
            .ba-btn {
                display: inline-flex;
                align-items: center;
                gap: 8px;
                padding: 12px 24px;
                border-radius: 10px;
                font-family: "Inter", sans-serif;
                font-weight: 700;
                font-size: 14px;
                cursor: pointer;
                border: none;
                transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
                text-decoration: none;
            }
            .ba-btn:hover {
                transform: translateY(-2px);
            }
            .ba-btn-primary {
                background: linear-gradient(135deg, #1a56db, #06b6d4);
                color: #fff;
                box-shadow: 0 8px 28px rgba(26, 86, 219, 0.4);
            }
            .ba-btn-primary:hover {
                box-shadow: 0 14px 36px rgba(26, 86, 219, 0.55);
            }
            .ba-btn-ghost {
                background: transparent;
                color: var(--text-hi);
                border: 1.5px solid var(--glass-border);
            }
            .ba-btn-ghost:hover {
                border-color: var(--blue-border);
                color: var(--blue-light);
            }
            .ba-btn-crimson {
                background: linear-gradient(135deg, #e02441, #b8182e);
                color: #fff;
                box-shadow: 0 8px 24px rgba(224, 36, 65, 0.35);
            }

            /* Radio cards */
            .role-card {
                border: 1.5px solid var(--glass-border);
                border-radius: 14px;
                padding: 18px 20px;
                cursor: pointer;
                transition: all 0.2s;
                background: rgba(255, 255, 255, 0.03);
            }
            .role-card.selected {
                border-color: var(--blue-light);
                background: rgba(59, 130, 246, 0.1);
                box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
            }
            .role-card:hover:not(.selected) {
                border-color: rgba(255, 255, 255, 0.2);
                background: rgba(255, 255, 255, 0.06);
            }

            /* Progress step */
            .step-dot {
                width: 32px;
                height: 32px;
                border-radius: 50%;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 12px;
                font-weight: 700;
                flex-shrink: 0;
                transition: all 0.3s;
            }
            .step-dot.done {
                background: linear-gradient(135deg, #1a56db, #06b6d4);
                color: #fff;
            }
            .step-dot.active {
                background: rgba(59, 130, 246, 0.2);
                border: 2px solid var(--blue-light);
                color: var(--blue-light);
            }
            .step-dot.pending {
                background: rgba(255, 255, 255, 0.05);
                border: 1px solid var(--glass-border);
                color: var(--text-lo);
            }

            /* Profile nav */
            .prof-nav-link {
                display: flex;
                align-items: center;
                gap: 10px;
                padding: 10px 14px;
                border-radius: 10px;
                color: var(--text-mid);
                font-size: 13px;
                font-weight: 500;
                cursor: pointer;
                transition: all 0.2s;
            }
            .prof-nav-link:hover,
            .prof-nav-link.active {
                background: rgba(59, 130, 246, 0.12);
                color: var(--blue-light);
            }

            /* Blurred overlay */
            .blur-overlay {
                position: absolute;
                inset: 0;
                backdrop-filter: blur(8px);
                -webkit-backdrop-filter: blur(8px);
                background: rgba(7, 17, 31, 0.65);
                border-radius: inherit;
                display: flex;
                align-items: center;
                justify-content: center;
                flex-direction: column;
                gap: 12px;
                z-index: 10;
            }

            /* Upload zone */
            .upload-zone {
                border: 2px dashed rgba(255, 255, 255, 0.12);
                border-radius: 12px;
                padding: 28px 20px;
                text-align: center;
                cursor: pointer;
                transition:
                    border-color 0.2s,
                    background 0.2s;
                background: rgba(255, 255, 255, 0.02);
            }
            .upload-zone:hover {
                border-color: var(--blue-light);
                background: rgba(59, 130, 246, 0.06);
            }

            /* Badge */
            .badge {
                display: inline-flex;
                align-items: center;
                gap: 6px;
                padding: 4px 12px;
                border-radius: 100px;
                font-size: 11px;
                font-weight: 700;
                letter-spacing: 0.5px;
            }
            .badge-blue {
                background: rgba(59, 130, 246, 0.15);
                border: 1px solid rgba(59, 130, 246, 0.3);
                color: var(--blue-light);
            }
            .badge-amber {
                background: rgba(251, 191, 36, 0.12);
                border: 1px solid rgba(251, 191, 36, 0.3);
                color: #fbbf24;
            }
            .badge-green {
                background: rgba(74, 222, 128, 0.1);
                border: 1px solid rgba(74, 222, 128, 0.25);
                color: #4ade80;
            }
            .badge-crimson {
                background: rgba(224, 36, 65, 0.12);
                border: 1px solid rgba(224, 36, 65, 0.3);
                color: #f87171;
            }

            /* Section label pill */
            .section-pill {
                display: inline-flex;
                align-items: center;
                gap: 7px;
                background: rgba(26, 86, 219, 0.12);
                border: 1px solid rgba(26, 86, 219, 0.28);
                color: var(--blue-light);
                padding: 4px 14px;
                border-radius: 100px;
                font-size: 10px;
                font-weight: 700;
                letter-spacing: 2px;
                text-transform: uppercase;
                margin-bottom: 16px;
            }

            /* Video player mock */
            .video-mock {
                background: linear-gradient(135deg, #07111f, #0d2040);
                border-radius: 14px;
                aspect-ratio: 16/9;
                display: flex;
                align-items: center;
                justify-content: center;
                border: 1px solid var(--glass-border);
                position: relative;
                overflow: hidden;
                cursor: pointer;
            }
            .video-mock::before {
                content: "";
                position: absolute;
                inset: 0;
                background: linear-gradient(
                    135deg,
                    rgba(26, 86, 219, 0.08),
                    rgba(6, 182, 212, 0.05)
                );
            }
            .play-btn {
                width: 56px;
                height: 56px;
                border-radius: 50%;
                background: rgba(255, 255, 255, 0.12);
                border: 2px solid rgba(255, 255, 255, 0.25);
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 20px;
                color: #fff;
                backdrop-filter: blur(8px);
                transition: all 0.2s;
                animation: floatY 3s ease-in-out infinite;
            }
            .video-mock:hover .play-btn {
                background: rgba(26, 86, 219, 0.5);
                border-color: var(--blue-light);
                transform: scale(1.1);
            }

            /* Avatar circle */
            .avatar-ring {
                border-radius: 50%;
                background: linear-gradient(135deg, #1a56db, #06b6d4);
                padding: 3px;
            }
            .avatar-inner {
                border-radius: 50%;
                background: var(--navy-3, #0d2040);
                width: 100%;
                height: 100%;
                display: flex;
                align-items: center;
                justify-content: center;
                font-family: "Sora", sans-serif;
                font-weight: 700;
                color: var(--text-hi);
            }

            /* Completion ring */
            .completion-ring {
                transform: rotate(-90deg);
            }

            /* Info grid tile */
            .info-tile {
                background: rgba(255, 255, 255, 0.04);
                border: 1px solid var(--glass-border);
                border-radius: 12px;
                padding: 14px 16px;
            }
            .info-tile-label {
                font-size: 10px;
                font-weight: 700;
                letter-spacing: 1px;
                text-transform: uppercase;
                color: var(--text-lo);
                margin-bottom: 4px;
            }
            .info-tile-value {
                font-size: 15px;
                font-weight: 600;
                color: var(--text-hi);
            }

            /* Notification dot */
            .notif-dot {
                width: 8px;
                height: 8px;
                border-radius: 50%;
                background: #e02441;
                position: absolute;
                top: 0;
                right: 0;
                animation: pulse 2s ease infinite;
            }

            /* Divider */
            .ba-divider {
                height: 1px;
                background: var(--glass-border);
                margin: 20px 0;
            }

            /* Error text */
            .ba-error {
                color: #f87171;
                font-size: 12px;
                margin-top: 4px;
            }

            /* Document Verification Scanner */
            .doc-scanner-container {
                position: relative;
                border-radius: 16px;
                overflow: hidden;
                background: rgba(255, 255, 255, 0.035);
                border: 1px solid var(--glass-border);
                backdrop-filter: blur(16px);
                -webkit-backdrop-filter: blur(16px);
            }

            .doc-preview-wrapper {
                position: relative;
                width: 100%;
                aspect-ratio: 8.5/11;
                background: linear-gradient(135deg, #0a1830, #0d2040);
                display: flex;
                align-items: center;
                justify-content: center;
                overflow: hidden;
            }

            .doc-preview-content {
                width: 100%;
                height: 100%;
                background: linear-gradient(to bottom, rgba(6, 182, 212, 0.05), rgba(26, 86, 219, 0.03));
                display: flex;
                flex-direction: column;
                align-items: center;
                justify-content: center;
                padding: 40px 30px;
                gap: 16px;
                position: relative;
            }

            .doc-file-icon {
                font-size: 64px;
                color: rgba(6, 182, 212, 0.6);
                margin-bottom: 12px;
            }

            .doc-filename {
                color: var(--text-mid);
                font-size: 14px;
                font-weight: 500;
                text-align: center;
            }

            .doc-filesize {
                color: var(--text-lo);
                font-size: 12px;
            }

            .laser-overlay {
                position: absolute;
                inset: 0;
                z-index: 10;
            }

            .doc-scanner-label {
                position: absolute;
                bottom: 20px;
                left: 20px;
                z-index: 5;
                font-size: 11px;
                font-weight: 700;
                letter-spacing: 1px;
                text-transform: uppercase;
                color: var(--blue-light);
                background: rgba(26, 86, 219, 0.2);
                padding: 6px 12px;
                border-radius: 100px;
                border: 1px solid rgba(26, 86, 219, 0.4);
            }

            .doc-status-area {
                padding: 24px;
                display: flex;
                flex-direction: column;
                align-items: center;
                gap: 12px;
                min-height: 100px;
                justify-content: center;
            }

            .doc-status-icon {
                font-size: 28px;
                animation: pulseVerified 0.8s ease-in-out;
            }

            .doc-status-text {
                font-size: 14px;
                font-weight: 600;
                text-align: center;
                color: var(--text-hi);
                transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            }

            .doc-status-verified {
                color: #4ade80;
                font-size: 16px;
                font-weight: 700;
            }

            .doc-verification-badge {
                display: inline-flex;
                align-items: center;
                gap: 8px;
                padding: 8px 16px;
                border-radius: 12px;
                background: rgba(74, 222, 128, 0.12);
                border: 1px solid rgba(74, 222, 128, 0.3);
                color: #4ade80;
                font-size: 12px;
                font-weight: 700;
                letter-spacing: 0.5px;
                animation: pulseVerified 0.8s ease-in-out;
            }

            .checkmark-svg {
                width: 24px;
                height: 24px;
                animation: successCheckmark 0.6s ease-in-out forwards;
            }

            .status-spinner {
                width: 24px;
                height: 24px;
                border: 2px solid rgba(6, 182, 212, 0.3);
                border-top-color: #06b6d4;
                border-radius: 50%;
                animation: spin 1s linear infinite;
            }

            /* Responsive helpers */
            @media (max-width: 768px) {
                .hide-mobile {
                    display: none !important;
                }
            }
        </style>
    </head>
    <body>
        <div id="root"></div>

        <script type="text/babel">
            const { useState, useRef, useEffect, useCallback } = React;

            /* ─── UTILS ──────────────────────────────────────────── */
            const initials = (name='') =>
              name.split(' ').slice(0,2).map(n=>n[0]||'').join('').toUpperCase() || '?';

            const COUNTRY_FLAGS = {
              Australia:'\uD83C\uDDE6\uD83C\uDDFA',
              Benin:'\uD83C\uDDE7\uD83C\uDDEF',
              Beninese:'\uD83C\uDDE7\uD83C\uDDEF',
              Brazil:'\uD83C\uDDE7\uD83C\uDDF7',
              Brazilian:'\uD83C\uDDE7\uD83C\uDDF7',
              Cameroon:'\uD83C\uDDE8\uD83C\uDDF2',
              Cameroonian:'\uD83C\uDDE8\uD83C\uDDF2',
              Canada:'\uD83C\uDDE8\uD83C\uDDE6',
              France:'\uD83C\uDDEB\uD83C\uDDF7',
              Germany:'\uD83C\uDDE9\uD83C\uDDEA',
              Ghana:'\uD83C\uDDEC\uD83C\uDDED',
              Ghanaian:'\uD83C\uDDEC\uD83C\uDDED',
              India:'\uD83C\uDDEE\uD83C\uDDF3',
              Indian:'\uD83C\uDDEE\uD83C\uDDF3',
              Ireland:'\uD83C\uDDEE\uD83C\uDDEA',
              Japan:'\uD83C\uDDEF\uD83C\uDDF5',
              Kenya:'\uD83C\uDDF0\uD83C\uDDEA',
              Kenyan:'\uD83C\uDDF0\uD83C\uDDEA',
              Morocco:'\uD83C\uDDF2\uD83C\uDDE6',
              Moroccan:'\uD83C\uDDF2\uD83C\uDDE6',
              Netherlands:'\uD83C\uDDF3\uD83C\uDDF1',
              Nigeria:'\uD83C\uDDF3\uD83C\uDDEC',
              Nigerian:'\uD83C\uDDF3\uD83C\uDDEC',
              Romania:'\uD83C\uDDF7\uD83C\uDDF4',
              Romanian:'\uD83C\uDDF7\uD83C\uDDF4',
              Senegal:'\uD83C\uDDF8\uD83C\uDDF3',
              Senegalese:'\uD83C\uDDF8\uD83C\uDDF3',
              Singapore:'\uD83C\uDDF8\uD83C\uDDEC',
              'South Africa':'\uD83C\uDDFF\uD83C\uDDE6',
              Switzerland:'\uD83C\uDDE8\uD83C\uDDED',
              'United Kingdom':'\uD83C\uDDEC\uD83C\uDDE7',
            };

            const getFlag = (value='') => COUNTRY_FLAGS[String(value).trim()] || '\uD83C\uDF0D';

            const splitPrograms = (value='') =>
              (Array.isArray(value) ? value : String(value).split(/[\n,;]+/))
                .map(v => String(v).trim())
                .filter(Boolean);

            const getAge = (dob) => {
              if (!dob) return null;
              const date = new Date(dob);
              if (Number.isNaN(date.getTime())) return null;
              const now = new Date();
              let years = now.getFullYear() - date.getFullYear();
              const beforeBirthday =
                now.getMonth() < date.getMonth() ||
                (now.getMonth() === date.getMonth() && now.getDate() < date.getDate());
              if (beforeBirthday) years -= 1;
              return years > 0 ? years : null;
            };

            const applicationStatusMeta = (value='new') => {
              const status = String(value || 'new').toLowerCase();
              const map = {
                new:       { label:'Applied',   badge:'badge-blue' },
                review:    { label:'In Review', badge:'badge-amber' },
                interview: { label:'Interview', badge:'badge-teal' },
                offer:     { label:'Offer',     badge:'badge-green' },
                rejected:  { label:'Rejected',  badge:'badge-crimson' },
                withdrawn: { label:'Withdrawn', badge:'badge-blue' },
              };
              return map[status] || { label: status, badge:'badge-blue' };
            };

            const normalizeStudentMarketplaceItem = (item) => {
              const gpaValue = item.gpa === '' || item.gpa === null || item.gpa === undefined
                ? null
                : Number(item.gpa);
              const completion = Number(item.completion_pct || 0);
              const verified = item.verified === true || item.verified === 'verified' || item.verified === 'approve';
              return {
                ...item,
                id: item.id,
                name: item.name || item.full_name || item.email || (item.id ? `Student #${item.id}` : 'Student Profile'),
                flag: item.flag || getFlag(item.nationality),
                nationality: item.nationality || 'Not specified',
                age: item.age || getAge(item.dob),
                gpa: Number.isFinite(gpaValue) ? gpaValue : 'N/A',
                major: item.major || 'Undeclared',
                budget: item.budget || 'Not shared',
                intake: item.intake || 'Not set',
                verified,
                match: item.match || Math.max(55, Math.min(96,
                  Math.round(completion * 0.7) +
                  (verified ? 18 : 0) +
                  (Number.isFinite(gpaValue) ? Math.round(gpaValue * 4) : 0)
                )),
                status: item.status || (verified ? 'Profile Ready' : 'Pending review'),
                desc: item.desc || item.description || 'Profile summary not added yet.',
              };
            };

            const normalizeUniversityMarketplaceItem = (item) => {
              const programs = splitPrograms(item.programs);
              const verified = item.verified === true || item.verified === 'verified' || item.verified === 'approve';
              const applicationCount = Number(item.application_count || item.applicationCount || 0);
              return {
                ...item,
                id: item.id,
                name: item.name || item.uni_name || (item.id ? `University #${item.id}` : 'University Profile'),
                flag: item.flag || getFlag(item.country),
                country: item.country || 'Country not specified',
                programs: programs.length ? programs : ['Program information pending'],
                intake: item.intake || item.intake_periods || 'Contact school',
                desc: item.desc || item.description || 'Institution description not added yet.',
                accredited: verified,
                verified,
                applicationCount,
                acceptance: item.acceptance || String(applicationCount),
                rank: item.rank || (verified ? 'Verified' : 'Pending'),
                tuition: item.tuition || 'Contact school',
                type: item.type || 'University',
                website: item.website || '',
                match: item.match || Math.max(60, Math.min(97,
                  62 + Math.min(programs.length, 5) * 4 + (verified ? 12 : 0) + Math.min(applicationCount, 7)
                )),
              };
            };

            const CompletionRing = ({ pct=0, size=80 }) => {
              const r = (size-8)/2;
              const circ = 2*Math.PI*r;
              const dash = circ*(pct/100);
              return (
                <svg width={size} height={size} style={{flexShrink:0}}>
                  <circle cx={size/2} cy={size/2} r={r} fill="none"
                    stroke="rgba(255,255,255,.07)" strokeWidth="7"/>
                  <circle cx={size/2} cy={size/2} r={r} fill="none"
                    stroke="url(#ringGrad)" strokeWidth="7"
                    strokeLinecap="round"
                    strokeDasharray={`${dash} ${circ}`}
                    style={{transform:'rotate(-90deg)',transformOrigin:'50% 50%',transition:'stroke-dasharray .8s cubic-bezier(.16,1,.3,1)'}}
                  />
                  <defs>
                    <linearGradient id="ringGrad" x1="0%" y1="0%" x2="100%" y2="0%">
                      <stop offset="0%" stopColor="#1a56db"/>
                      <stop offset="100%" stopColor="#06b6d4"/>
                    </linearGradient>
                  </defs>
                  <text x="50%" y="50%" dominantBaseline="middle" textAnchor="middle"
                    fill="#f0f4ff" fontSize="14" fontWeight="700" fontFamily="Sora,sans-serif">
                    {pct}%
                  </text>
                </svg>
              );
            };

            const InfoTile = ({label, value, icon}) => (
              <div className="info-tile">
                <div className="info-tile-label">{icon && <i className={`fa-solid ${icon} mr-1`}/>}{label}</div>
                <div className="info-tile-value">{value || '—'}</div>
              </div>
            );

            const VideoMock = ({label}) => (
              <div className="video-mock">
                <div className="play-btn"><i className="fa-solid fa-play" style={{marginLeft:3}}/></div>
                <div style={{position:'absolute',bottom:14,left:14,
                  background:'rgba(0,0,0,.5)',backdropFilter:'blur(8px)',
                  padding:'5px 12px',borderRadius:8,fontSize:12,color:'#94a3b8'}}>
                  <i className="fa-solid fa-video mr-2"/>{label}
                </div>
              </div>
            );

            const DocUploadPanel = ({ role, user, setUser }) => {
              const [documents, setDocuments] = useState({});
              const [loading, setLoading] = useState(true);
              const [progress, setProgress] = useState({});
              const [uploading, setUploading] = useState({});
              const [error, setError] = useState('');
              const inputRefs = useRef({});

              const docConfig = role === 'university'
                ? [
                    { key:'logo', label:'University Logo', icon:'fa-image' },
                    { key:'accreditation', label:'Accreditation Certificate', icon:'fa-certificate' },
                    { key:'brochure', label:'Programs Brochure', icon:'fa-book-open' },
                  ]
                : [
                    { key:'transcript', label:'Academic Transcript', icon:'fa-file-lines' },
                    { key:'passport', label:'Passport / ID', icon:'fa-passport' },
                    { key:'recommendation_1', label:'Recommendation Letter 1', icon:'fa-envelope-open-text' },
                    { key:'recommendation_2', label:'Recommendation Letter 2', icon:'fa-envelope-open-text' },
                    { key:'personal_statement', label:'Personal Statement', icon:'fa-pen-nib' },
                    { key:'cv', label:'Curriculum Vitae', icon:'fa-file-user' },
                    { key:'language_cert', label:'Language Certificate', icon:'fa-language' },
                    { key:'birth_certificate', label:'Birth Certificate', icon:'fa-certificate' },
                  ];

              const syncUserDocs = (docsMap) => {
                if (!setUser) return;
                const flags = {};
                docConfig.forEach((doc) => {
                  flags[doc.key] = !!(docsMap && docsMap[doc.key]);
                });
                setUser(prev => ({ ...prev, ...flags }));
              };

              const loadDocuments = () => {
                setLoading(true);
                // ✅ LOCAL STORAGE: Load documents
                setTimeout(() => {
                  const docs = window.BALocalStorage.getDocuments();
                  setDocuments(docs);
                  syncUserDocs(docs);
                  setLoading(false);
                }, 200);
              };

              useEffect(() => {
                loadDocuments();
              }, [role]);

              const uploadDoc = (docType, file) => {
                if (!file) return;
                setError('');
                setUploading(prev => ({ ...prev, [docType]: true }));
                setProgress(prev => ({ ...prev, [docType]: 0 }));

                // ✅ LOCAL STORAGE: Simulate file upload with progress
                let progress = 0;
                const interval = setInterval(() => {
                  progress += Math.random() * 40;
                  if (progress > 100) progress = 100;
                  setProgress(prev => ({ ...prev, [docType]: Math.round(progress) }));
                  
                  if (progress >= 100) {
                    clearInterval(interval);
                    // Save document to localStorage
                    setDocuments(prev => {
                      const next = {
                        ...prev,
                        [docType]: {
                          doc_type: docType,
                          file_name: file.name,
                          status: 'pending',
                          uploaded_at: new Date().toISOString(),
                          file_path: `data/${docType}/${file.name}`,
                        },
                      };
                      window.BALocalStorage.saveDocuments(next);
                      syncUserDocs(next);
                      return next;
                    });
                    setProgress(prev => ({ ...prev, [docType]: 100 }));
                    setUploading(prev => ({ ...prev, [docType]: false }));
                  }
                }, 300);
              };

              const statusBadgeClass = (status) => {
                if (status === 'approved') return 'badge-green';
                if (status === 'rejected') return 'badge-crimson';
                if (status === 'pending') return 'badge-amber';
                return 'badge-blue';
              };

              return (
                <div className="glass-card page-enter" style={{borderRadius:18,padding:24}}>
                  <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:12,flexWrap:'wrap',marginBottom:20}}>
                    <div>
                      <div className="section-pill">
                        <i className="fa-solid fa-folder-open"/> Documents
                      </div>
                      <h3 style={{fontFamily:"'Sora',sans-serif",fontWeight:700,fontSize:20,marginBottom:4}}>
                        {role === 'university' ? 'Verification Documents' : 'Student Verification Documents'}
                      </h3>
                      <p style={{color:'#64748b',fontSize:13}}>
                        Upload required files to move your profile toward verification.
                      </p>
                    </div>
                    <button className="ba-btn ba-btn-ghost" style={{fontSize:13,padding:'10px 16px'}}
                      onClick={loadDocuments}>
                      <i className="fa-solid fa-rotate-right"/> Refresh
                    </button>
                  </div>

                  {error && (
                    <div className="ba-error" style={{marginBottom:16}}>
                      {error}
                    </div>
                  )}

                  {loading ? (
                    <div style={{textAlign:'center',padding:'36px 20px',color:'#64748b',fontSize:13}}>
                      Loading documents...
                    </div>
                  ) : (
                    <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:16}}>
                      {docConfig.map((doc) => {
                        const current = documents[doc.key];
                        const status = current?.status || 'missing';
                        const isUploading = !!uploading[doc.key];
                        const pct = progress[doc.key] || 0;
                        return (
                          <div key={doc.key} style={{
                            padding:18,borderRadius:14,
                            background:'rgba(255,255,255,.03)',
                            border:'1px solid rgba(255,255,255,.08)',
                          }}>
                            <input
                              type="file"
                              accept=".pdf,.jpg,.jpeg,.png,.webp"
                              ref={(el) => { inputRefs.current[doc.key] = el; }}
                              style={{display:'none'}}
                              onChange={(e) => {
                                const file = e.target.files && e.target.files[0];
                                uploadDoc(doc.key, file);
                                e.target.value = '';
                              }}
                            />
                            <div style={{display:'flex',alignItems:'flex-start',gap:12}}>
                              <div style={{width:42,height:42,borderRadius:12,
                                background:'rgba(26,86,219,.14)',display:'flex',alignItems:'center',justifyContent:'center',
                                flexShrink:0}}>
                                <i className={`fa-solid ${doc.icon}`} style={{fontSize:18,color:'#3b82f6'}}/>
                              </div>
                              <div style={{flex:1,minWidth:0}}>
                                <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',gap:10}}>
                                  <div style={{fontWeight:700,fontSize:14}}>{doc.label}</div>
                                  <span className={`badge ${statusBadgeClass(status)}`}>
                                    {status === 'missing' ? 'Not uploaded' : status}
                                  </span>
                                </div>
                                <div style={{fontSize:12,color:'#64748b',marginTop:6,lineHeight:1.6}}>
                                  {current?.file_name || 'Accepted: PDF, JPG, PNG, WEBP'}
                                </div>
                                {current?.uploaded_at && (
                                  <div style={{fontSize:11,color:'#3d5a80',marginTop:4}}>
                                    Uploaded {new Date(current.uploaded_at).toLocaleDateString('en-GB')}
                                  </div>
                                )}
                                {current?.file_path && (
                                  <a
                                    href={`../../${current.file_path}`}
                                    target="_blank"
                                    rel="noreferrer"
                                    style={{display:'inline-block',marginTop:8,fontSize:12,color:'#3b82f6',textDecoration:'none'}}
                                  >
                                    <i className="fa-solid fa-eye"/> View current file
                                  </a>
                                )}
                              </div>
                            </div>

                            {isUploading && (
                              <div style={{marginTop:14}}>
                                <div style={{height:8,borderRadius:999,background:'rgba(255,255,255,.06)',overflow:'hidden'}}>
                                  <div style={{
                                    width:`${pct}%`,
                                    height:'100%',
                                    background:'linear-gradient(90deg,#1a56db,#06b6d4)',
                                    transition:'width .2s ease',
                                  }}/>
                                </div>
                                <div style={{fontSize:11,color:'#64748b',marginTop:6}}>
                                  Uploading... {pct}%
                                </div>
                              </div>
                            )}

                            <div style={{display:'flex',gap:10,marginTop:14,flexWrap:'wrap'}}>
                              <button
                                className="ba-btn ba-btn-primary"
                                style={{padding:'10px 16px',fontSize:13}}
                                disabled={isUploading}
                                onClick={() => inputRefs.current[doc.key] && inputRefs.current[doc.key].click()}
                              >
                                <i className="fa-solid fa-upload"/> {current ? 'Replace File' : 'Upload File'}
                              </button>
                              {status === 'rejected' && (
                                <div style={{fontSize:12,color:'#f87171',alignSelf:'center'}}>
                                  Re-upload required
                                </div>
                              )}
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  )}
                </div>
              );
            };

            /* ─── SHARED NAV BAR ─────────────────────────────────── */
            const NotificationsDropdown = ({onClose, onUnreadChange}) => {
              const [notifs, setNotifs] = useState([]);
              const [loading, setLoading] = useState(true);
              const ref = useRef(null);

              useEffect(() => {
                // ✅ LOCAL STORAGE: Load notifications
                const notifs = window.BALocalStorage.getNotifications();
                setNotifs(notifs);
                onUnreadChange && onUnreadChange(notifs.filter(n => !n.is_read).length);
              }, []);

              useEffect(() => {
                const handleOutside = (event) => {
                  if (ref.current && !ref.current.contains(event.target)) {
                    onClose();
                  }
                };
                document.addEventListener('mousedown', handleOutside);
                return () => document.removeEventListener('mousedown', handleOutside);
              }, [onClose]);

              const syncUnread = (items) => {
                if (!onUnreadChange) return;
                onUnreadChange(items.filter(n => !n.is_read || n.is_read === 0).length);
              };

              const markAllRead = () => {
                // ✅ LOCAL STORAGE: Mark all notifications as read
                setNotifs(prev => {
                  const next = prev.map(n => ({ ...n, is_read: 1 }));
                  window.BALocalStorage.saveNotifications(next);
                  syncUnread(next);
                  return next;
                });
              };

              const markOneRead = (id, unread) => {
                if (!unread) return;
                // ✅ LOCAL STORAGE: Mark single notification as read
                setNotifs(prev => {
                  const next = prev.map(n => n.id === id ? ({ ...n, is_read: 1 }) : n);
                  window.BALocalStorage.saveNotifications(next);
                  syncUnread(next);
                  return next;
                });
              };

              const TYPE_ICON = {
                verified: 'fa-circle-check',
                rejected: 'fa-circle-xmark',
                new_message: 'fa-envelope',
                application_update: 'fa-paper-plane',
                application: 'fa-paper-plane',
                certificate: 'fa-certificate',
                default: 'fa-bell',
              };

              const TYPE_COLOR = {
                verified: '#4ade80',
                rejected: '#f87171',
                certificate: '#fbbf24',
                default: '#3b82f6',
              };

              return (
                <div ref={ref} style={{
                  position:'absolute', top:46, right:0, width:340, maxHeight:440,
                  overflowY:'auto', zIndex:200,
                  background:'#0a1830', border:'1px solid rgba(255,255,255,.1)',
                  borderRadius:16, boxShadow:'0 24px 60px rgba(0,0,0,.5)',
                }}>
                  <div style={{
                    display:'flex', alignItems:'center', justifyContent:'space-between',
                    padding:'14px 18px', borderBottom:'1px solid rgba(255,255,255,.07)',
                  }}>
                    <span style={{ fontWeight:700, fontSize:14, color:'#f0f4ff' }}>
                      Notifications
                    </span>
                    <button onClick={markAllRead} style={{
                      background:'none', border:'none', cursor:'pointer',
                      color:'#3b82f6', fontSize:12, fontWeight:600, fontFamily:'Inter,sans-serif',
                    }}>
                      Mark all read
                    </button>
                  </div>

                  {loading ? (
                    <div style={{ padding:24, textAlign:'center', color:'#64748b', fontSize:13 }}>
                      Loading...
                    </div>
                  ) : notifs.length === 0 ? (
                    <div style={{ padding:32, textAlign:'center' }}>
                      <i className="fa-solid fa-bell-slash"
                        style={{ fontSize:28, color:'#3d5a80', marginBottom:10, display:'block' }}/>
                      <p style={{ color:'#64748b', fontSize:13 }}>No notifications yet</p>
                    </div>
                  ) : (
                    notifs.map(n => {
                      const icon = TYPE_ICON[n.type] || TYPE_ICON.default;
                      const color = TYPE_COLOR[n.type] || TYPE_COLOR.default;
                      const unread = !n.is_read || n.is_read === 0;
                      return (
                        <button
                          key={n.id}
                          onClick={() => markOneRead(n.id, unread)}
                          style={{
                            width:'100%', textAlign:'left', background: unread ? 'rgba(59,130,246,.06)' : 'transparent',
                            border:'none', borderBottom:'1px solid rgba(255,255,255,.04)', cursor:'pointer',
                            display:'flex', gap:12, padding:'13px 18px',
                          }}>
                          <div style={{
                            width:36, height:36, borderRadius:50, flexShrink:0,
                            background: color + '22',
                            display:'flex', alignItems:'center', justifyContent:'center',
                          }}>
                            <i className={`fa-solid ${icon}`} style={{ color, fontSize:14 }}/>
                          </div>
                          <div style={{ flex:1 }}>
                            <div style={{ fontSize:13, fontWeight: unread ? 700 : 500, color:'#f0f4ff', marginBottom:2 }}>
                              {n.title}
                            </div>
                            {n.body && (
                              <div style={{ fontSize:12, color:'#64748b', lineHeight:1.5 }}>{n.body}</div>
                            )}
                            <div style={{ fontSize:11, color:'#3d5a80', marginTop:4 }}>
                              {n.created_at ? new Date(n.created_at).toLocaleString('en-GB', {
                                day:'2-digit', month:'short', hour:'2-digit', minute:'2-digit'
                              }) : ''}
                            </div>
                          </div>
                          {unread && (
                            <div style={{
                              width:8, height:8, borderRadius:50, background:'#3b82f6',
                              flexShrink:0, marginTop:4,
                            }}/>
                          )}
                        </button>
                      );
                    })
                  )}
                </div>
              );
            };

            const TopBar = ({onLogo, onNavigate, currentPath, user}) => {
              // treat user as "logged in" when on profile or marketplace so we can
              // navigate back and forth without losing the nav links
              const loggedIn =
                currentPath &&
                (currentPath.startsWith('/profile') || currentPath.startsWith('/marketplace'));
              const profilePath =
                user && user.role === 'university'
                  ? '/profile/university'
                  : '/profile/student';
              const [showNotifs, setShowNotifs] = useState(false);
              const [unreadCount, setUnreadCount] = useState(0);

              useEffect(() => {
                if (!loggedIn) return;
                // ✅ LOCAL STORAGE: Load unread count
                const notifs = window.BALocalStorage.getNotifications();
                setUnreadCount(notifs.filter(n => !n.is_read).length);
              }, [loggedIn]);
              return (
                <div style={{
                  position:'fixed',top:0,left:0,right:0,zIndex:100,
                  background:'rgba(7,17,31,.92)',backdropFilter:'blur(20px)',
                  borderBottom:'1px solid rgba(255,255,255,.07)',
                  padding:'0 28px',height:60,
                  display:'flex',alignItems:'center',justifyContent:'space-between',gap:16
                }}>
                  <button onClick={onLogo} style={{
                    background:'none',border:'none',cursor:'pointer',
                    fontFamily:"'Sora',sans-serif",fontWeight:800,fontSize:18,color:'#f0f4ff',
                    letterSpacing:-.3,flexShrink:0
                  }}>
                    Better<span className="grad-text">Abroad</span>
                  </button>

                  {loggedIn && onNavigate && (

            /* ─── LOCAL API (No Backend) ───────────────────────────── */
            const api = {

            /* ─── SIGNUP VIEW ────────────────────────────────────── */
            const SignupView = ({onNavigate, setUser}) => {
              const [authTab, setAuthTab] = useState('signup');
              const [form, setForm] = useState({email:'',password:'',confirm:'',role:'student'});
              const [errors, setErrors] = useState({});
              const [saving, setSaving] = useState(false);

              const validate = () => {
                const e = {};
                if(!form.email.includes('@')) e.email = 'Enter a valid email';
                if(form.password.length < 8) e.password = 'Min 8 characters';
                if(form.password !== form.confirm) e.confirm = 'Passwords do not match';
                return e;
              };

              const normalizeLoginError = (message) => {
                const text = String(message || '').toLowerCase();
                if (
                  text.includes('incorrect password') ||
                  text.includes('no account found') ||
                  text.includes('incorrect email or password')
                ) {
                  return 'Incorrect email or password';
                }
                return message || 'Sign in failed. Please try again.';
              };

              const signin = () => {
                const e = {};
                if(!form.email.includes('@')) e.email = 'Enter a valid email';
                if(!form.password) e.password = 'Enter your password';
                if(Object.keys(e).length){ setErrors(e); return; }
                setErrors({});
                setSaving(true);
                
                // ✅ LOCAL AUTH: Check email/password from localStorage
                setTimeout(() => {
                  const storedUser = window.BALocalStorage.getUser();
                  if (storedUser && storedUser.email === form.email && storedUser.password === form.password) {
                    const role = storedUser.role || 'student';
                    const profile = storedUser;
                    setUser(prev => ({
                      ...prev,
                      email: storedUser.email,
                      role,
                      fullName: profile.fullName || '',
                      uniName: profile.uniName || '',
                      phone: profile.phone || '',
                      gpa: profile.gpa || '',
                      major: profile.major || '',
                      budget: profile.budget || '',
                      intake: profile.intake || '',
                      nationality: profile.nationality || '',
                      dob: profile.dob || '',
                      country: profile.country || '',
                      website: profile.website || '',
                      programs: profile.programs || '',
                      intakePeriods: profile.intakePeriods || '',
                      description: profile.description || '',
                      userId: storedUser.userId || prev.userId,
                      verified: profile.verified || 'pending',
                    }));

                    const profileComplete = role === 'university'
                      ? !!profile.uniName
                      : !!(profile.fullName && profile.gpa);

                    onNavigate(
                      profileComplete
                        ? (role === 'university' ? '/profile/university' : '/profile/student')
                        : (role === 'university' ? '/register/university' : '/register/student')
                    );
                  } else {
                    setErrors({ general: 'Incorrect email or password' });
                  }
                  setSaving(false);
                }, 600);
              };

              const submit = () => {
                const e = validate();
                if(Object.keys(e).length){ setErrors(e); return; }
                setErrors({});
                setSaving(true);
                
                // ✅ LOCAL SIGNUP: Store new user in localStorage
                setTimeout(() => {
                  const newUser = {
                    email: form.email,
                    password: form.password,
                    role: form.role,
                    fullName: '',
                    uniName: '',
                    userId: Date.now(),
                    verified: 'pending',
                    tosAccepted: true,
                  };
                  window.BALocalStorage.saveUser(newUser);
                  
                  setUser(prev => ({
                    ...prev,
                    email: newUser.email,
                    role: newUser.role,
                    userId: newUser.userId,
                  }));
                  onNavigate((newUser.role) === 'university' ? '/register/university' : '/register/student');
                  setSaving(false);
                }, 600);
              };

                setForm(p=>({...p,[k]:v}));
                setErrors(p=>({...p,[k]:'', general:''}));
              };

                      <h1 style={{fontFamily:"'Sora',sans-serif",fontSize:'clamp(32px,3.5vw,52px)',
                        fontWeight:800,lineHeight:1.15,marginBottom:20,color:'#f0f4ff'}}>
                        Create Your<br/><span className="grad-text">Verified Account</span>
                      </h1>
                      <p style={{color:'#94a3b8',lineHeight:1.8,maxWidth:420,marginBottom:40}}>
                        Join thousands of students and partner universities on the only platform where every profile is verified by a trusted institutional partner.
                      </p>

                      {[
                        {icon:'fa-shield-halved',text:'End-to-end institutional verification'},

                          <div style={{width:40,height:40,borderRadius:10,
                            background:'rgba(26,86,219,.15)',border:'1px solid rgba(59,130,246,.25)',
                            display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                            <i className={`fa-solid ${f.icon}`} style={{color:'#3b82f6'}}/>
                          </div>
                          <span style={{color:'#94a3b8',fontSize:14}}>{f.text}</span>
                        </div>
                      ))}
                    </div>
                  </div>

                  {/* RIGHT PANEL — FORM */}
                  <div style={{flex:1,display:'flex',alignItems:'center',justifyContent:'center',
                    padding:'80px 24px',paddingTop:100}}>

                      width:'100%',maxWidth:440}}>

                            className="ba-btn"

                            style={{
                              justifyContent:'center',

                      {authTab === 'signup' && (

                          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:12}}>
                            {[
                              {val:'student',icon:'fa-user-graduate',label:'Student'},
                              {val:'university',icon:'fa-university',label:'University'},
                            ].map(r=>(
                              <div key={r.val} className={`role-card ${form.role===r.val?'selected':''}`}
                                onClick={()=>set('role',r.val)}
                                style={{display:'flex',alignItems:'center',gap:12}}>

                                  display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>

                                    style={{color:form.role===r.val?'#3b82f6':'#64748b'}}/>
                                </div>
                                <div>
                                  <div style={{fontWeight:600,fontSize:14}}>{r.label}</div>
                                  <div style={{fontSize:11,color:'#64748b'}}>
                                    {r.val==='student'?'Seeking admission':'Partner institution'}
                                  </div>
                                </div>
                              </div>
                            ))}
                          </div>
                        </div>
                      )}

                      {/* Email */}
                      <div style={{marginBottom:16}}>
                        <label className="ba-label">Email Address</label>
                        <input className="ba-input" type="email" placeholder="you@email.com"
                          value={form.email} onChange={e=>set('email',e.target.value)}/>
                        {errors.email && <div className="ba-error">{errors.email}</div>}
                      </div>

                      {/* Password */}
                      <div style={{marginBottom:16}}>
                        <label className="ba-label">Password</label>
                        <input className="ba-input" type="password" placeholder="Min 8 characters"
                          value={form.password} onChange={e=>set('password',e.target.value)}/>

                      {authTab === 'signup' && (

                      <button className="ba-btn ba-btn-primary" style={{width:'100%',justifyContent:'center'}}
                        onClick={authTab === 'signup' ? submit : signin}>
                        {saving

            /* ─── REGISTER STUDENT ───────────────────────────────── */
            const RegisterStudent = ({user, setUser, onNavigate}) => {
              const [step, setStep] = useState(0);
              const [form, setForm] = useState({
                fullName:    user.fullName    || '',
                dob:         user.dob         || '',
                nationality: user.nationality || '',
                gpa:         user.gpa         || '',
                major:       user.major       || '',
                intake:      user.intake      || '',
                budget:      user.budget      || '',
                transcript:  null,
                passport:    null,
              });
              const [errors, setErrors] = useState({});
              const [saving, setSaving] = useState(false);

              const set = (k,v) => {
                setForm(p=>({...p,[k]:v}));
                setErrors(p=>({...p,[k]:'', general:''}));
              };

              const steps = ['Personal','Academic','Financial','Documents'];

              const validateStep = () => {
                const e = {};
                if(step===0){
                  if(!form.fullName.trim()) e.fullName='Required';
                  if(!form.dob) e.dob='Required';
                  if(!form.nationality.trim()) e.nationality='Required';
                }
                if(step===1){
                  const g = parseFloat(form.gpa);
                  if(isNaN(g)||g<0||g>5) e.gpa='Enter GPA between 0.0–5.0';
                  if(!form.major.trim()) e.major='Required';
                  if(!form.intake) e.intake='Required';
                }
                if(step===2){ if(!form.budget) e.budget='Required'; }
                return e;
              };

              const next = () => {
                const e = validateStep();
                if(Object.keys(e).length){ setErrors(e); return; }
                if(step<3) setStep(s=>s+1);
                else finish();
              };

              const finish = () => {
                const e = validateStep();
                if(Object.keys(e).length){ setErrors(e); return; }

                setErrors({});
                setSaving(true);
                
                // ✅ LOCAL STORAGE: Save student profile
                setTimeout(() => {
                  const updated = {
                    fullName: form.fullName,
                    dob: form.dob,
                    nationality: form.nationality,
                    gpa: parseFloat(form.gpa),
                    major: form.major,
                    budget: form.budget,
                    description: form.description || '',
                    verified: 'pending',
                  };
                  window.BALocalStorage.saveUser({ ...window.BALocalStorage.getUser(), ...updated });
                  setUser(prev => ({ ...prev, ...form, profile: updated, verified: 'pending' }));
                  onNavigate('/profile/student');
                  setSaving(false);
                }, 400);
              };

              return (
                <div style={{minHeight:'100vh',background:
                  'radial-gradient(ellipse at 70% 30%, rgba(6,182,212,.06) 0%, transparent 50%), #07111f',
                  paddingTop:80}}>
                  <TopBar onLogo={()=>onNavigate('/signup')} currentPath="/register/student"/>

                  <div style={{maxWidth:940,margin:'0 auto',padding:'40px 20px',
                    display:'grid',gridTemplateColumns:'220px 1fr',gap:28}}>

                    {/* SIDEBAR */}
                    <div style={{position:'sticky',top:80,height:'fit-content'}}>
                      <div className="glass-card" style={{borderRadius:18,padding:24}}>
                        <div className="section-pill" style={{fontSize:9,marginBottom:20}}>
                          <i className="fa-solid fa-user-graduate"/> Student
                        </div>
                        <div style={{display:'flex',flexDirection:'column',gap:8}}>
                          {steps.map((s,i)=>(
                            <div key={i} style={{display:'flex',alignItems:'center',gap:12,cursor:'pointer'}}
                              onClick={()=>{ if(i<step) setStep(i); }}>
                              <div className={`step-dot ${i<step?'done':i===step?'active':'pending'}`}>
                                {i<step ? <i className="fa-solid fa-check" style={{fontSize:11}}/> : i+1}
                              </div>
                              <span style={{fontSize:13,fontWeight:i===step?600:400,
                                color:i===step?'#f0f4ff':i<step?'#4ade80':'#3d5a80'}}>{s}</span>
                            </div>
                          ))}
                        </div>
                        <div className="ba-divider"/>
                        <p style={{fontSize:11,color:'#3d5a80',lineHeight:1.7}}>
                          Documents can be uploaded later. Your profile can be created now.
                        </p>
                      </div>
                    </div>

                    {/* FORM PANEL */}
                    <div className="glass-card page-enter" style={{borderRadius:20,padding:'32px 28px'}}>
                      {errors.general && (
                        <div className="ba-error" style={{marginBottom:12}}>
                          {errors.general}
                        </div>
                      )}

                      <h2 style={{fontFamily:"'Sora',sans-serif",fontWeight:700,fontSize:22,marginBottom:4}}>
                        {steps[step]}
                      </h2>
                      <p style={{color:'#64748b',fontSize:13,marginBottom:28}}>
                        Step {step+1} of {steps.length}
                      </p>

                      {/* STEP 0 — PERSONAL */}
                      {step===0 && (
                        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:18}}>
                          <div style={{gridColumn:'1/-1'}}>
                            <label className="ba-label">Full Name</label>
                            <input className="ba-input" placeholder="John Doe"
                              value={form.fullName} onChange={e=>set('fullName',e.target.value)}/>
                            {errors.fullName && <div className="ba-error">{errors.fullName}</div>}
                          </div>
                          <div>
                            <label className="ba-label">Date of Birth</label>
                            <input className="ba-input" type="date"
                              value={form.dob} onChange={e=>set('dob',e.target.value)}/>
                            {errors.dob && <div className="ba-error">{errors.dob}</div>}
                          </div>
                          <div>
                            <label className="ba-label">Nationality</label>
                            <input className="ba-input" placeholder="e.g. Cameroonian"
                              value={form.nationality} onChange={e=>set('nationality',e.target.value)}/>
                            {errors.nationality && <div className="ba-error">{errors.nationality}</div>}
                          </div>
                        </div>
                      )}

                      {/* STEP 1 — ACADEMIC */}
                      {step===1 && (
                        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:18}}>
                          <div>
                            <label className="ba-label">GPA (0.0 – 5.0)</label>
                            <input className="ba-input" type="number" step="0.01" min="0" max="5"

                          <div>
                            <label className="ba-label">Intended Major</label>
                            <input className="ba-input" placeholder="Computer Science"
                              value={form.major} onChange={e=>set('major',e.target.value)}/>
                            {errors.major && <div className="ba-error">{errors.major}</div>}
                          </div>
                          <div style={{gridColumn:'1/-1'}}>
                            <label className="ba-label">Intake Period</label>
                            <select className="ba-input"
                              value={form.intake} onChange={e=>set('intake',e.target.value)}>

                              <option>Fall 2026</option><option>Spring 2027</option>
                            </select>
                            {errors.intake && <div className="ba-error">{errors.intake}</div>}
                          </div>
                        </div>
                      )}

                      {/* STEP 2 — FINANCIAL */}
                      {step===2 && (
                        <div>
                          <label className="ba-label">Annual Budget Range (USD)</label>
                          <select className="ba-input"
                            value={form.budget} onChange={e=>set('budget',e.target.value)}>
                            <option value="">Select budget range...</option>
                            <option>Under $10,000</option>
                            <option>$10,000 – $20,000</option>
                            <option>$20,000 – $35,000</option>
                            <option>$35,000 – $50,000</option>
                            <option>$50,000+</option>
                          </select>
                          {errors.budget && <div className="ba-error">{errors.budget}</div>}

                          <div style={{marginTop:20,padding:16,borderRadius:12,
                            background:'rgba(251,191,36,.06)',border:'1px solid rgba(251,191,36,.2)'}}>
                            <div style={{display:'flex',gap:10,alignItems:'flex-start'}}>
                              <i className="fa-solid fa-circle-info" style={{color:'#fbbf24',marginTop:2}}/>
                              <p style={{color:'#94a3b8',fontSize:13,lineHeight:1.7}}>
                                Your budget helps us match you with scholarship opportunities and universities within your financial range. This is never shared publicly.
                              </p>
                            </div>
                          </div>
                        </div>
                      )}

                      {/* STEP 3 — DOCUMENTS */}
                      {step===3 && (
                        <div style={{display:'grid',gap:20}}>
                          <p style={{color:'#64748b',fontSize:13,marginBottom:4}}>
                            <i className="fa-solid fa-circle-info mr-2" style={{color:'#3b82f6'}}/>
                            You can skip document upload and complete later from your profile.
                          </p>
                          {[
                            {key:'transcript',label:'Academic Transcript',icon:'fa-file-lines'},
                            {key:'passport',label:'Passport / ID Document',icon:'fa-passport'},
                          ].map(doc=>(
                            <div key={doc.key} className="upload-zone"
                              onClick={()=>set(doc.key,`${doc.label} uploaded`)}>
                              <i className={`fa-solid ${doc.icon}`}
                                style={{fontSize:28,color:form[doc.key]?'#4ade80':'#3d5a80',marginBottom:10}}/>
                              <div style={{fontWeight:600,fontSize:14,marginBottom:4,
                                color:form[doc.key]?'#4ade80':'#f0f4ff'}}>
                                {form[doc.key] ? '✓ '+doc.label : doc.label}
                              </div>
                              <div style={{fontSize:12,color:'#3d5a80'}}>
                                {form[doc.key] ? 'File ready' : 'Click to upload PDF, JPG, PNG'}
                              </div>
                            </div>
                          ))}
                        </div>
                      )}

                      {/* ACTIONS */}
                      <div style={{display:'flex',justifyContent:'space-between',
                        alignItems:'center',marginTop:36}}>
                        <button className="ba-btn ba-btn-ghost"
                          onClick={()=>step>0?setStep(s=>s-1):onNavigate('/signup')}
                          style={{fontSize:13}}>
