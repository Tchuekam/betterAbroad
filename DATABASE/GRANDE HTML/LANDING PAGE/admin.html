<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>BetterAbroad — Admin Panel</title>
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=JetBrains+Mono:wght@400;600&family=Inter:wght@300;400;500;600;700&display=swap"
            rel="stylesheet"
        />
        <link
            rel="stylesheet"
            href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
        />
        <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>

        <style>
            :root {
                --bg: #050d18;
                --bg2: #07111f;
                --bg3: #0a1628;
                --panel: #0d1e35;
                --blue: #1a56db;
                --blue-l: #3b82f6;
                --teal: #06b6d4;
                --green: #22c55e;
                --amber: #f59e0b;
                --red: #ef4444;
                --crimson: #e02441;
                --purple: #8b5cf6;
                --text-hi: #f0f4ff;
                --text-mid: #94a3b8;
                --text-lo: #3d5a80;
                --border: rgba(255, 255, 255, 0.07);
                --border-b: rgba(59, 130, 246, 0.25);
                --glass: rgba(255, 255, 255, 0.035);
            }
            *,
            *::before,
            *::after {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            html {
                scroll-behavior: smooth;
            }
            body {
                font-family: "Inter", sans-serif;
                background: var(--bg);
                color: var(--text-hi);
                min-height: 100vh;
                overflow-x: hidden;
            }
            ::-webkit-scrollbar {
                width: 4px;
                height: 4px;
            }
            ::-webkit-scrollbar-track {
                background: var(--bg);
            }
            ::-webkit-scrollbar-thumb {
                background: var(--blue);
                border-radius: 4px;
            }

            @keyframes fadeUp {
                from {
                    opacity: 0;
                    transform: translateY(16px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }
            @keyframes fadeIn {
                from {
                    opacity: 0;
                }
                to {
                    opacity: 1;
                }
            }
            @keyframes slideIn {
                from {
                    opacity: 0;
                    transform: translateX(24px);
                }
                to {
                    opacity: 1;
                    transform: translateX(0);
                }
            }
            @keyframes slideUp {
                from {
                    opacity: 0;
                    transform: translateY(24px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }
            @keyframes pulse {
                0%,
                100% {
                    opacity: 1;
                }
                50% {
                    opacity: 0.4;
                }
            }
            .sp-skeleton {
                background: rgba(255, 255, 255, 0.04);
                border: 1px solid var(--border);
                animation: pulse 1.5s ease-in-out infinite;
            }
            @keyframes countUp {
                from {
                    opacity: 0;
                    transform: translateY(8px);
                }
                to {
                    opacity: 1;
                    transform: translateY(0);
                }
            }
            @keyframes shimmer {
                from {
                    background-position: -400px 0;
                }
                to {
                    background-position: 400px 0;
                }
            }
            @keyframes toastIn {
                from {
                    opacity: 0;
                    transform: translateX(100%);
                }
                to {
                    opacity: 1;
                    transform: translateX(0);
                }
            }
            @keyframes spin {
                to {
                    transform: rotate(360deg);
                }
            }
            @keyframes scanline {
                0% {
                    transform: translateY(-100%);
                }
                100% {
                    transform: translateY(100vh);
                }
            }

            .fade-up {
                animation: fadeUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) both;
            }
            .slide-in {
                animation: slideIn 0.35s cubic-bezier(0.16, 1, 0.3, 1) both;
            }

            /* ── SIDEBAR ─────────────────────────────────────── */
            .sidebar {
                position: fixed;
                left: 0;
                top: 0;
                bottom: 0;
                width: 240px;
                background: var(--bg2);
                border-right: 1px solid var(--border);
                display: flex;
                flex-direction: column;
                z-index: 50;
            }
            .sidebar-logo {
                padding: 20px 20px 16px;
                border-bottom: 1px solid var(--border);
                display: flex;
                align-items: center;
                gap: 10px;
            }
            .logo-badge {
                width: 32px;
                height: 32px;
                border-radius: 8px;
                background: linear-gradient(135deg, #1a56db, #06b6d4);
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 14px;
                font-weight: 800;
                color: #fff;
                font-family: "Sora", sans-serif;
                flex-shrink: 0;
            }
            .logo-text {
                font-family: "Sora", sans-serif;
                font-weight: 800;
                font-size: 15px;
            }
            .logo-text span {
                background: linear-gradient(90deg, #3b82f6, #06b6d4);
                -webkit-background-clip: text;
                -webkit-text-fill-color: transparent;
                background-clip: text;
            }
            .sidebar-section-label {
                padding: 16px 20px 6px;
                font-size: 9px;
                font-weight: 700;
                letter-spacing: 2px;
                text-transform: uppercase;
                color: var(--text-lo);
            }
            .nav-item {
                display: flex;
                align-items: center;
                gap: 10px;
                padding: 9px 20px;
                margin: 1px 8px;
                border-radius: 10px;
                font-size: 13px;
                font-weight: 500;
                color: var(--text-mid);
                cursor: pointer;
                transition: all 0.15s;
                position: relative;
            }
            .nav-item:hover {
                background: rgba(255, 255, 255, 0.04);
                color: var(--text-hi);
            }
            .nav-item.active {
                background: rgba(26, 86, 219, 0.15);
                color: var(--blue-l);
            }
            .nav-item.active::before {
                content: "";
                position: absolute;
                left: -8px;
                top: 50%;
                transform: translateY(-50%);
                width: 3px;
                height: 18px;
                background: var(--blue-l);
                border-radius: 2px;
            }
            .nav-icon {
                width: 16px;
                text-align: center;
                flex-shrink: 0;
                font-size: 13px;
            }
            .nav-badge {
                margin-left: auto;
                background: var(--red);
                color: #fff;
                font-size: 9px;
                font-weight: 700;
                padding: 2px 6px;
                border-radius: 100px;
                min-width: 18px;
                text-align: center;
            }
            .nav-badge.blue {
                background: rgba(59, 130, 246, 0.2);
                color: var(--blue-l);
            }
            .sidebar-footer {
                margin-top: auto;
                padding: 16px 20px;
                border-top: 1px solid var(--border);
            }
            .admin-chip {
                display: flex;
                align-items: center;
                gap: 10px;
                padding: 10px 12px;
                border-radius: 10px;
                background: rgba(255, 255, 255, 0.03);
                border: 1px solid var(--border);
                cursor: pointer;
                transition: all 0.2s;
            }
            .admin-chip:hover {
                background: rgba(255, 255, 255, 0.06);
            }
            .admin-avatar {
                width: 30px;
                height: 30px;
                border-radius: 8px;
                background: linear-gradient(135deg, #e02441, #1a56db);
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 11px;
                font-weight: 700;
                flex-shrink: 0;
            }

            /* ── TOP BAR ─────────────────────────────────────── */
            .topbar {
                position: fixed;
                top: 0;
                left: 240px;
                right: 0;
                height: 56px;
                background: rgba(5, 13, 24, 0.9);
                backdrop-filter: blur(20px);
                border-bottom: 1px solid var(--border);
                display: flex;
                align-items: center;
                justify-content: space-between;
                padding: 0 28px;
                z-index: 40;
            }
            .topbar-title {
                font-family: "Sora", sans-serif;
                font-weight: 700;
                font-size: 16px;
            }
            .topbar-right {
                display: flex;
                align-items: center;
                gap: 12px;
            }
            .icon-btn {
                width: 34px;
                height: 34px;
                border-radius: 8px;
                background: rgba(255, 255, 255, 0.04);
                border: 1px solid var(--border);
                display: flex;
                align-items: center;
                justify-content: center;
                cursor: pointer;
                color: var(--text-mid);
                font-size: 14px;
                transition: all 0.2s;
                position: relative;
            }
            .icon-btn:hover {
                background: rgba(255, 255, 255, 0.08);
                color: var(--text-hi);
            }
            .notif-dot {
                position: absolute;
                top: 4px;
                right: 4px;
                width: 7px;
                height: 7px;
                border-radius: 50%;
                background: var(--red);
                border: 1.5px solid var(--bg);
                animation: pulse 2s ease infinite;
            }

            /* ── MAIN CONTENT ────────────────────────────────── */
            .main {
                margin-left: 240px;
                padding-top: 56px;
                min-height: 100vh;
            }
            .page {
                padding: 28px;
                animation: fadeUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) both;
            }

            /* ── STAT CARDS ──────────────────────────────────── */
            .stat-grid {
                display: grid;
                grid-template-columns: repeat(4, 1fr);
                gap: 16px;
                margin-bottom: 28px;
            }
            .stat-card {
                background: var(--panel);
                border: 1px solid var(--border);
                border-radius: 16px;
                padding: 20px;
                position: relative;
                overflow: hidden;
                transition: all 0.2s;
                cursor: default;
            }
            .stat-card:hover {
                border-color: rgba(59, 130, 246, 0.25);
                transform: translateY(-2px);
            }
            .stat-card::before {
                content: "";
                position: absolute;
                top: 0;
                right: 0;
                width: 80px;
                height: 80px;
                border-radius: 50%;
                opacity: 0.06;
                transform: translate(20px, -20px);
            }
            .stat-label {
                font-size: 11px;
                font-weight: 700;
                letter-spacing: 1px;
                text-transform: uppercase;
                color: var(--text-lo);
                margin-bottom: 10px;
            }
            .stat-value {
                font-family: "Sora", sans-serif;
                font-size: 32px;
                font-weight: 800;
                line-height: 1;
                margin-bottom: 8px;
                animation: countUp 0.6s both;
            }
            .stat-change {
                font-size: 12px;
                display: flex;
                align-items: center;
                gap: 5px;
            }
            .stat-icon {
                position: absolute;
                top: 18px;
                right: 18px;
                width: 36px;
                height: 36px;
                border-radius: 10px;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 16px;
            }

            /* ── TABLE ───────────────────────────────────────── */
            .table-card {
                background: var(--panel);
                border: 1px solid var(--border);
                border-radius: 16px;
                overflow: hidden;
                margin-bottom: 24px;
            }
            .table-header {
                padding: 18px 22px;
                border-bottom: 1px solid var(--border);
                display: flex;
                align-items: center;
                justify-content: space-between;
                flex-wrap: wrap;
                gap: 12px;
            }
            .table-title {
                font-family: "Sora", sans-serif;
                font-weight: 700;
                font-size: 15px;
            }
            .table-actions {
                display: flex;
                gap: 8px;
                align-items: center;
                flex-wrap: wrap;
            }
            .search-wrap {
                position: relative;
            }
            .search-wrap i {
                position: absolute;
                left: 11px;
                top: 50%;
                transform: translateY(-50%);
                color: var(--text-lo);
                font-size: 12px;
                pointer-events: none;
            }
            .adm-input {
                background: rgba(255, 255, 255, 0.05);
                border: 1px solid rgba(255, 255, 255, 0.08);
                color: var(--text-hi);
                padding: 8px 12px 8px 32px;
                border-radius: 9px;
                font-family: "Inter", sans-serif;
                font-size: 12px;
                outline: none;
                transition: border-color 0.2s;
            }
            .adm-input:focus {
                border-color: var(--blue-l);
            }
            .adm-input::placeholder {
                color: var(--text-lo);
            }
            .adm-select {
                background: rgba(255, 255, 255, 0.05);
                border: 1px solid rgba(255, 255, 255, 0.08);
                color: var(--text-hi);
                padding: 8px 12px;
                border-radius: 9px;
                font-family: "Inter", sans-serif;
                font-size: 12px;
                outline: none;
                cursor: pointer;
            }
            .adm-select option {
                background: #0d1e35;
            }
            .adm-btn {
                display: inline-flex;
                align-items: center;
                gap: 7px;
                padding: 8px 16px;
                border-radius: 9px;
                font-family: "Inter", sans-serif;
                font-size: 12px;
                font-weight: 600;
                cursor: pointer;
                border: none;
                transition: all 0.2s;
            }
            .adm-btn:hover {
                transform: translateY(-1px);
            }
            .adm-btn-primary {
                background: linear-gradient(135deg, #1a56db, #06b6d4);
                color: #fff;
                box-shadow: 0 4px 16px rgba(26, 86, 219, 0.3);
            }
            .adm-btn-ghost {
                background: rgba(255, 255, 255, 0.05);
                color: var(--text-hi);
                border: 1px solid var(--border);
            }
            .adm-btn-ghost:hover {
                background: rgba(255, 255, 255, 0.09);
            }
            .adm-btn-green {
                background: rgba(34, 197, 94, 0.15);
                color: #4ade80;
                border: 1px solid rgba(34, 197, 94, 0.3);
            }
            .adm-btn-green:hover {
                background: rgba(34, 197, 94, 0.25);
            }
            .adm-btn-red {
                background: rgba(239, 68, 68, 0.12);
                color: #f87171;
                border: 1px solid rgba(239, 68, 68, 0.25);
            }
            .adm-btn-red:hover {
                background: rgba(239, 68, 68, 0.22);
            }
            .adm-btn-amber {
                background: rgba(245, 158, 11, 0.12);
                color: #fbbf24;
                border: 1px solid rgba(245, 158, 11, 0.25);
            }

            table {
                width: 100%;
                border-collapse: collapse;
            }
            thead tr {
                background: rgba(255, 255, 255, 0.025);
            }
            th {
                padding: 11px 18px;
                text-align: left;
                font-size: 10px;
                font-weight: 700;
                letter-spacing: 1px;
                text-transform: uppercase;
                color: var(--text-lo);
                white-space: nowrap;
                border-bottom: 1px solid var(--border);
            }
            td {
                padding: 13px 18px;
                font-size: 13px;
                border-bottom: 1px solid rgba(255, 255, 255, 0.04);
                vertical-align: middle;
            }
            tr:last-child td {
                border-bottom: none;
            }
            tbody tr {
                transition: background 0.15s;
                cursor: pointer;
            }
            tbody tr:hover {
                background: rgba(255, 255, 255, 0.03);
            }
            .th-check {
                width: 40px;
            }
            input[type="checkbox"] {
                width: 14px;
                height: 14px;
                cursor: pointer;
                accent-color: var(--blue-l);
            }

            /* ── BADGES ──────────────────────────────────────── */
            .badge {
                display: inline-flex;
                align-items: center;
                gap: 5px;
                padding: 3px 10px;
                border-radius: 100px;
                font-size: 10px;
                font-weight: 700;
                letter-spacing: 0.3px;
            }
            .badge-green {
                background: rgba(34, 197, 94, 0.12);
                border: 1px solid rgba(34, 197, 94, 0.25);
                color: #4ade80;
            }
            .badge-amber {
                background: rgba(245, 158, 11, 0.1);
                border: 1px solid rgba(245, 158, 11, 0.25);
                color: #fbbf24;
            }
            .badge-red {
                background: rgba(239, 68, 68, 0.1);
                border: 1px solid rgba(239, 68, 68, 0.25);
                color: #f87171;
            }
            .badge-blue {
                background: rgba(59, 130, 246, 0.12);
                border: 1px solid rgba(59, 130, 246, 0.25);
                color: #60a5fa;
            }
            .badge-purple {
                background: rgba(139, 92, 246, 0.12);
                border: 1px solid rgba(139, 92, 246, 0.25);
                color: #a78bfa;
            }
            .badge-teal {
                background: rgba(6, 182, 212, 0.1);
                border: 1px solid rgba(6, 182, 212, 0.25);
                color: #22d3ee;
            }
            .status-dot {
                width: 6px;
                height: 6px;
                border-radius: 50%;
                display: inline-block;
            }
            .dot-green {
                background: #22c55e;
                animation: pulse 2s ease infinite;
            }
            .dot-amber {
                background: #f59e0b;
            }
            .dot-red {
                background: #ef4444;
            }

            /* ── AVATAR ──────────────────────────────────────── */
            .tbl-avatar {
                width: 32px;
                height: 32px;
                border-radius: 8px;
                flex-shrink: 0;
                display: flex;
                align-items: center;
                justify-content: center;
                font-family: "Sora", sans-serif;
                font-weight: 700;
                font-size: 11px;
            }
            .tbl-user {
                display: flex;
                align-items: center;
                gap: 10px;
            }
            .tbl-name {
                font-weight: 600;
                font-size: 13px;
            }
            .tbl-sub {
                font-size: 11px;
                color: var(--text-lo);
                margin-top: 1px;
            }

            /* ── MODAL ───────────────────────────────────────── */
            .modal-overlay {
                position: fixed;
                inset: 0;
                z-index: 200;
                background: rgba(5, 13, 24, 0.85);
                backdrop-filter: blur(8px);
                display: flex;
                align-items: center;
                justify-content: center;
                padding: 20px;
                animation: fadeIn 0.2s both;
            }
            .modal {
                background: var(--bg3);
                border: 1px solid rgba(255, 255, 255, 0.09);
                border-radius: 20px;
                width: 100%;
                max-width: 640px;
                max-height: 90vh;
                overflow-y: auto;
                animation: slideUp 0.3s cubic-bezier(0.16, 1, 0.3, 1) both;
            }
            .modal-header {
                padding: 20px 24px;
                border-bottom: 1px solid var(--border);
                display: flex;
                align-items: center;
                justify-content: space-between;
                position: sticky;
                top: 0;
                background: var(--bg3);
                z-index: 10;
            }
            .modal-title {
                font-family: "Sora", sans-serif;
                font-weight: 700;
                font-size: 17px;
            }
            .modal-close {
                width: 30px;
                height: 30px;
                border-radius: 7px;
                background: rgba(255, 255, 255, 0.06);
                border: 1px solid var(--border);
                color: var(--text-mid);
                cursor: pointer;
                font-size: 15px;
                display: flex;
                align-items: center;
                justify-content: center;
                transition: all 0.2s;
            }
            .modal-close:hover {
                background: rgba(239, 68, 68, 0.15);
                color: #f87171;
                border-color: rgba(239, 68, 68, 0.3);
            }
            .modal-body {
                padding: 24px;
            }
            .modal-footer {
                padding: 16px 24px;
                border-top: 1px solid var(--border);
                display: flex;
                justify-content: flex-end;
                gap: 10px;
                background: rgba(255, 255, 255, 0.01);
                position: sticky;
                bottom: 0;
            }

            /* ── DOCUMENT VIEWER ─────────────────────────────── */
            .doc-frame {
                background: rgba(255, 255, 255, 0.03);
                border: 1px solid var(--border);
                border-radius: 12px;
                aspect-ratio: 4/3;
                display: flex;
                align-items: center;
                justify-content: center;
                position: relative;
                overflow: hidden;
                margin-bottom: 16px;
            }
            .doc-mock-content {
                text-align: center;
                padding: 40px;
            }

            /* ── VERIFICATION DETAIL ─────────────────────────── */
            .detail-grid {
                display: grid;
                grid-template-columns: 1fr 1fr;
                gap: 10px;
                margin-bottom: 20px;
            }
            .detail-tile {
                background: rgba(255, 255, 255, 0.03);
                border: 1px solid var(--border);
                border-radius: 10px;
                padding: 12px 14px;
            }
            .detail-label {
                font-size: 10px;
                font-weight: 700;
                letter-spacing: 0.5px;
                text-transform: uppercase;
                color: var(--text-lo);
                margin-bottom: 4px;
            }
            .detail-value {
                font-size: 13px;
                font-weight: 600;
            }

            /* ── ACTIVITY LOG ────────────────────────────────── */
            .log-item {
                display: flex;
                align-items: flex-start;
                gap: 14px;
                padding: 14px 0;
                border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            }
            .log-item:last-child {
                border-bottom: none;
            }
            .log-icon-wrap {
                width: 32px;
                height: 32px;
                border-radius: 8px;
                flex-shrink: 0;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 13px;
            }
            .log-time {
                font-family: "JetBrains Mono", monospace;
                font-size: 11px;
                color: var(--text-lo);
            }

            /* ── TOAST ───────────────────────────────────────── */
            .toast-container {
                position: fixed;
                top: 68px;
                right: 20px;
                z-index: 999;
                display: flex;
                flex-direction: column;
                gap: 10px;
            }
            .toast {
                display: flex;
                align-items: center;
                gap: 12px;
                padding: 13px 18px;
                border-radius: 12px;
                min-width: 300px;
                max-width: 380px;
                background: var(--bg3);
                border: 1px solid var(--border);
                box-shadow: 0 16px 48px rgba(0, 0, 0, 0.5);
                animation: toastIn 0.3s cubic-bezier(0.16, 1, 0.3, 1) both;
                font-size: 13px;
            }
            .toast-icon {
                width: 28px;
                height: 28px;
                border-radius: 7px;

                const studentName =

                    row.student_email ||
                    `Student #${row.student_id ?? "?"}`;
                const universityName =
                    row.university ||
                    row.uni_name ||
                    row.uni_email ||
                    `University #${row.university_id ?? "?"}`;
                return {
                    ...row,
                    _normalizedApp: true,
                    id: parseInt(row.id, 10),
                    status: row.status || "new",
                    student: studentName,
                    university: universityName,
                    full_name: row.full_name || studentName,

                    "linear-gradient(135deg,#d97706,#ef4444)",
                    "linear-gradient(135deg,#1a56db,#7c3aed)",
                ];
                let h = 0;
                for (let i = 0; i < name.length; i++)
                    h = name.charCodeAt(i) + ((h << 5) - h);
                return colors[Math.abs(h) % colors.length];

                        3500,
                    );

                    success: "fa-circle-check",
                    error: "fa-circle-xmark",
                    info: "fa-circle-info",
                    warn: "fa-triangle-exclamation",

                    info: "rgba(59,130,246,.12)",
                    warn: "rgba(245,158,11,.12)",

                return (

                const [activeType, setActiveType] = useState("all");

                const all = [

                        .filter((s) => s.verified === "pending")

                    ...universities
                        .filter((u) => u.verified === "pending")

                const filtered =
                    activeType === "all"
                        ? all
                        : all.filter((x) => x._type === activeType);

                const handleVerify = (id, note, type) => {
                    fetch("../../DATABASE/verify.php", {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        credentials: "include",
                        body: JSON.stringify({
                            user_id: id,
                            type: type,

                    const diffSec = Math.floor(diffMs / 1000);
                    const diffMin = Math.floor(diffSec / 60);
                    const diffHour = Math.floor(diffMin / 60);
                    const diffDay = Math.floor(diffHour / 24);
                    
                    if (diffSec < 60) return "just now";
                    if (diffMin < 60) return `${diffMin}m ago`;

                                                    defaultValue={f.val}
                                                    placeholder={f.ph}
                                                    style={{
                                                        width: "100%",
                                                        padding: "9px 12px",
                                                    }}
                                                />
                                            </div>
                                        ))}
                                    </div>
                                    <div
                                        style={{
                                            marginTop: 16,
                                            display: "flex",
                                            justifyContent: "flex-end",
                                        }}
                                    >
                                        <button
                                            className="adm-btn adm-btn-primary"
                                            onClick={() => {
                                                setSaved(true);
                                                toast(
                                                    "success",
                                                    "Profile updated successfully",
                                                );
                                            }}
                                        >
                                            <i className="fa-solid fa-floppy-disk" />{" "}
                                            Save Changes
                                        </button>
                                    </div>
                                </div>

                                {/* Notifications */}
                                <div
                                    className="table-card"
                                    style={{ padding: 24 }}
                                >
                                    <div
                                        style={{
                                            fontFamily: "'Sora',sans-serif",
                                            fontWeight: 700,
                                            fontSize: 15,
                                            marginBottom: 4,
                                        }}
                                    >
                                        Notifications
                                    </div>
                                    <div
                                        style={{
                                            fontSize: 11,
                                            color: "var(--text-lo)",
                                            marginBottom: 20,
                                        }}
                                    >
                                        Control when and how you receive alerts
                                    </div>
                                    <Setting
                                        label="New student registration"
                                        desc="Alert when a new student signs up"
                                    >
                                        <Toggle defaultOn={true} />
                                    </Setting>
                                    <Setting
                                        label="New university registration"
                                        desc="Alert when a new institution registers"
                                    >
                                        <Toggle defaultOn={true} />
                                    </Setting>
                                    <Setting
                                        label="Pending verification reminder"
                                        desc="Daily digest of unreviewed profiles"
                                    >
                                        <Toggle defaultOn={true} />
                                    </Setting>
                                    <Setting
                                        label="Application status changes"
                                        desc="Notify on pipeline movements"
                                    >
                                        <Toggle defaultOn={false} />
                                    </Setting>
                                    <Setting
                                        label="Email notifications"
                                        desc="Receive alerts via email as well as in-panel"
                                    >
                                        <Toggle defaultOn={true} />
                                    </Setting>
                                </div>
                            </div>

                            <div
                                style={{
                                    display: "flex",
                                    flexDirection: "column",
                                    gap: 16,
                                }}
                            >
                                {/* Platform settings */}
                                <div
                                    className="table-card"
                                    style={{ padding: 20 }}
                                >
                                    <div
                                        style={{
                                            fontFamily: "'Sora',sans-serif",
                                            fontWeight: 700,
                                            fontSize: 14,
                                            marginBottom: 16,
                                        }}
                                    >
                                        Platform
                                    </div>
                                    <Setting
                                        label="Auto-verify on full docs"
                                        desc="Automatically verify when all docs uploaded"
                                    >
                                        <Toggle defaultOn={false} />
                                    </Setting>
                                    <Setting
                                        label="New user welcome email"
                                        desc="Send onboarding email on signup"
                                    >
                                        <Toggle defaultOn={true} />
                                    </Setting>
                                    <Setting
                                        label="Maintenance mode"
                                        desc="Hide platform from all non-admin users"
                                    >
                                        <Toggle defaultOn={false} />
                                    </Setting>
                                </div>

                                {/* Danger zone */}
                                <div
                                    style={{
                                        background: "rgba(239,68,68,.05)",
                                        border: "1px solid rgba(239,68,68,.2)",
                                        borderRadius: 14,
                                        padding: 20,
                                    }}
                                >
                                    <div
                                        style={{
                                            fontFamily: "'Sora',sans-serif",
                                            fontWeight: 700,
                                            fontSize: 14,
                                            marginBottom: 4,
                                            color: "#f87171",
                                        }}
                                    >
                                        <i className="fa-solid fa-triangle-exclamation mr-2" />
                                        Danger Zone
                                    </div>
                                    <p
                                        style={{
                                            fontSize: 11,
                                            color: "var(--text-lo)",
                                            lineHeight: 1.7,
                                            marginBottom: 16,
                                        }}
                                    >
                                        Irreversible and destructive actions.
                                        Proceed with caution.
                                    </p>
                                    <div
                                        style={{
                                            display: "flex",
                                            flexDirection: "column",
                                            gap: 8,
                                        }}
                                    >
                                        <button
                                            className="adm-btn adm-btn-ghost"
                                            style={{
                                                justifyContent: "flex-start",
                                                fontSize: 12,
                                            }}
                                            onClick={() =>
                                                toast(
                                                    "warn",
                                                    "All rejected users have been notified",
                                                )
                                            }
                                        >
                                            <i className="fa-solid fa-envelope" />{" "}
                                            Email All Rejected Users
                                        </button>
                                        <button
                                            className="adm-btn adm-btn-ghost"
                                            style={{
                                                justifyContent: "flex-start",
                                                fontSize: 12,
                                            }}
                                            onClick={() =>
                                                toast(
                                                    "warn",
                                                    "Purge queued — 30 days inactive accounts",
                                                )
                                            }
                                        >
                                            <i className="fa-solid fa-trash-can" />{" "}
                                            Purge Inactive Accounts
                                        </button>
                                    </div>
                                    <div className="divider" />
                                    <button
                                        className="adm-btn adm-btn-red full-w"
                                        onClick={onLogout}
                                        style={{
                                            width: "100%",
                                            justifyContent: "center",
                                        }}
                                    >
                                        <i className="fa-solid fa-right-from-bracket" />{" "}
                                        Sign Out of Admin
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                );
            };

            /* ══════════════════════════════════════════════
   LAYOUT (Sidebar + Topbar)
══════════════════════════════════════════════ */
            const AdminLayout = ({ admin, onLogout }) => {
                const [page, setPage] = useState("dashboard");
                const [students, setStudents] = useState([]);
                const [universities, setUniversities] = useState([]);
                const [appCount, setAppCount] = useState(0); // 🛡️ FIX: was APPLICATIONS.length (hardcoded mock)
                const [loadingDirectory, setLoadingDirectory] = useState(true);
                const [loadError, setLoadError] = useState("");

                const toast = useToast();

                /* ── Fetch helpers ───────────────────────── */
                const loadStudents = useCallback(() => {
                    return fetch("../../DATABASE/users.php?role=student", { credentials: "include" })
                        .then((r) => {
                            if (!r.ok) {
                                console.error("❌ users.php student:", r.status);
                                setLoadError("Could not load data. Please refresh.");
                                return null;
                            }
                            return r.json();
                        })
                        .then((data) => {
                            if (data && data.success) {
                                setStudents((data.students || []).map(normalizeStudent));
                                setLoadError("");
                            }
                        })
                        .catch((err) => {
                            console.error("❌ users.php student:", err);
                            setLoadError("Could not load data. Please refresh.");
                        });
                }, []);

                const loadUniversities = useCallback(() => {
                    return fetch("../../DATABASE/users.php?role=university", { credentials: "include" })
                        .then((r) => {
                            if (!r.ok) {
                                console.error("❌ users.php university:", r.status);
                                setLoadError("Could not load data. Please refresh.");
                                return null;
                            }
                            return r.json();
                        })
                        .then((data) => {
                            if (data && data.success) {
                                setUniversities((data.universities || []).map(normalizeUniversity));
                                setLoadError("");
                            }
                        })
                        .catch((err) => {
                            console.error("❌ users.php university:", err);
                            setLoadError("Could not load data. Please refresh.");
                        });
                }, []);

                /* ── Initial load ────────────────────────── */
                // 📝 EDIT: Single initial load using correct path callbacks
                useEffect(() => {
                    Promise.all([
                        loadStudents(),
                        loadUniversities(),
                        fetch("../../DATABASE/applications.php", { credentials: "include" })
                            .then((r) => r.json())
                            .then((data) => {
                                if (data.success) {
                                    setAppCount((data.applications || []).length);
                                }
                            })
                            .catch((err) => {
                                console.error("❌ applications.php:", err);
                                setLoadError("Could not load data. Please refresh.");
                            }),
                    ]).finally(() => setLoadingDirectory(false));
                }, [loadStudents, loadUniversities]);

                /* ── 30-second polling: detect new pending ── */
                useEffect(() => {
                    const pollNew = () => {
                        fetch("../../DATABASE/users.php?role=student&status=pending", {
                            credentials: "include",
                        })
                            .then((r) => r.json())
                            .then((data) => {
                                if (data.success && data.students) {
                                    const newIds = data.students.map((s) => s.id);
                                    const currentIds = students.map((s) => s.id);
                                    const hasNew = newIds.some((id) => !currentIds.includes(id));
                                    if (hasNew) {
                                        loadStudents();
                                        toast("info", "New student profiles pending verification.");
                                    }
                                }
                            })
                            .catch((err) => {
                                console.error("❌ users.php student:", err);
                                setLoadError("Could not load data. Please refresh.");
                            });
                        fetch("../../DATABASE/users.php?role=university&status=pending", {
                            credentials: "include",
                        })
                            .then((r) => r.json())
                            .then((data) => {
                                if (data.success && data.universities) {
                                    const newIds = data.universities.map((u) => u.id);
                                    const currentIds = universities.map((u) => u.id);
                                    const hasNew = newIds.some((id) => !currentIds.includes(id));
                                    if (hasNew) {
                                        loadUniversities();
                                        toast("info", "New university profiles pending verification.");
                                    }
                                }
                            })
                            .catch((err) => {
                                console.error("❌ users.php university:", err);
                                setLoadError("Could not load data. Please refresh.");
                            });
                    };
                    const t = setInterval(pollNew, 30000);
                    return () => clearInterval(t);
                }, [students, universities, loadStudents, loadUniversities, toast]);

                const pendingCount = [
                    ...students.filter((s) => s.verified === "pending"),
                    ...universities.filter((u) => u.verified === "pending"),
                ].length;

                const updateVerification = (id, status, note, type) => {
                    if (type === "student") {
                        setStudents((prev) =>
                            prev.map((s) =>
                                s.id === id
                                    ? {
                                          ...s,
                                          verified: status,
                                          notes: note || s.notes,
                                      }
                                    : s,
                            ),
                        );
                    } else {
                        setUniversities((prev) =>
                            prev.map((u) =>
                                u.id === id
                                    ? {
                                          ...u,
                                          verified: status,
                                          notes: note || u.notes,
                                      }
                                    : u,
                            ),
                        );
                    }
                };

                const deleteUser = (id, type) => {
                    if (type === "student")
                        setStudents((prev) => prev.filter((s) => s.id !== id));
                    else
                        setUniversities((prev) =>
                            prev.filter((u) => u.id !== id),
                        );
                };

                const pageTitle =
                    {
                        dashboard: "Dashboard",
                        pending: "Verification Queue",
                        documents: "Documents",
                        students: "Students",
                        universities: "Universities",
                        applications: "Applications",
                        seminars: "Seminars",
                        certificates: "Certificates",
                        commission: "Commission Log",
                        activity: "Activity Log",
                        settings: "Settings",
                    }[page] || "Admin";

                const nav = [
                    { id: "dashboard", icon: "fa-gauge", label: "Dashboard" },
                    {
                        id: "pending",
                        icon: "fa-clock",
                        label: "Pending Queue",
                        badge: pendingCount,
                        badgeStyle: "",
                    },
                    {
                        id: "documents",
                        icon: "fa-folder-open",
                        label: "Documents",
                    },
                    {
                        id: "students",
                        icon: "fa-user-graduate",
                        label: "Students",
                        badge: students.length,
                        badgeStyle: "blue",
                    },
                    {
                        id: "universities",
                        icon: "fa-university",
                        label: "Universities",
                        badge: universities.length,
                        badgeStyle: "blue",
                    },
                    {
                        id: "applications",
                        icon: "fa-list-check",
                        label: "Applications",
                        badge: appCount,
                        badgeStyle: "blue",
                    },
                    {
                        id: "seminars",
                        icon: "fa-chalkboard-teacher",
                        label: "Seminars",
                        badge: 0,
                        badgeStyle: "blue",
                    },
                    {
                        id: "certificates",
                        icon: "fa-certificate",
                        label: "Certificates",
                    },
                    {
                        id: "commission",
                        icon: "fa-coins",
                        label: "Commission Log",
                    },
                    {
                        id: "activity",
                        icon: "fa-scroll",
                        label: "Activity Log",
                    },
                    { id: "settings", icon: "fa-gear", label: "Settings" },
                ];

                return (
                    <div style={{ display: "flex" }}>
                        {/* SIDEBAR */}
                        <div className="sidebar">
                            <div className="sidebar-logo">
                                <div className="logo-badge">BA</div>
                                <div>
                                    <div className="logo-text">
                                        Better<span>Abroad</span>
                                    </div>
                                    <div
                                        style={{
                                            fontSize: 9,
                                            color: "var(--text-lo)",
                                            letterSpacing: 1.5,
                                            textTransform: "uppercase",
                                            fontWeight: 700,
                                        }}
                                    >
                                        Admin Panel
                                    </div>
                                </div>
                            </div>

                            <div className="sidebar-section-label">
                                Navigation
                            </div>
                            {nav.map((n) => (
                                <div
                                    key={n.id}
                                    className={`nav-item ${page === n.id ? "active" : ""}`}
                                    onClick={() => setPage(n.id)}
                                >
                                    <i
                                        className={`fa-solid ${n.icon} nav-icon`}
                                    />
                                    <span style={{ flex: 1 }}>{n.label}</span>
                                    {n.badge != null && n.badge > 0 && (
                                        <span
                                            className={`nav-badge ${n.badgeStyle || ""}`}
                                        >
                                            {n.badge}
                                        </span>
                                    )}
                                </div>
                            ))}

                            <div className="sidebar-footer">
                                <div
                                    style={{
                                        fontSize: 9,
                                        fontWeight: 700,
                                        letterSpacing: 1.5,
                                        textTransform: "uppercase",
                                        color: "var(--text-lo)",
                                        marginBottom: 8,
                                    }}
                                >
                                    Logged in as
                                </div>
                                <div
                                    className="admin-chip"
                                    onClick={() => setPage("settings")}
                                >
                                    <div className="admin-avatar">
                                        {initials(admin.name)}
                                    </div>
                                    <div style={{ flex: 1, minWidth: 0 }}>
                                        <div
                                            style={{
                                                fontSize: 12,
                                                fontWeight: 600,
                                                overflow: "hidden",
                                                textOverflow: "ellipsis",
                                                whiteSpace: "nowrap",
                                            }}
                                        >
                                            {admin.name}
                                        </div>
                                        <div
                                            style={{
                                                fontSize: 10,
                                                color: "var(--text-lo)",
                                            }}
                                        >
                                            Super Admin
                                        </div>
                                    </div>
                                    <i
                                        className="fa-solid fa-ellipsis-vertical"
                                        style={{
                                            color: "var(--text-lo)",
                                            fontSize: 11,
                                        }}
                                    />
                                </div>
                            </div>
                        </div>

                        {/* TOP BAR */}
                        <div className="topbar">
                            <div
                                style={{
                                    display: "flex",
                                    alignItems: "center",
                                    gap: 10,
                                }}
                            >
                                <div
                                    style={{
                                        display: "flex",
                                        gap: 4,
                                        fontSize: 11,
                                        color: "var(--text-lo)",
                                    }}
                                >
                                    <span>Admin</span>
                                    <i
                                        className="fa-solid fa-chevron-right"
                                        style={{ fontSize: 9, margin: "0 2px" }}
                                    />
                                    <span style={{ color: "var(--text-mid)" }}>
                                        {pageTitle}
                                    </span>
                                </div>
                            </div>
                            <div className="topbar-right">
                                <div
                                    className="icon-btn"
                                    onClick={() => {
                                        toast(
                                            "info",
                                            `${pendingCount} items pending review`,
                                        );
                                    }}
                                >
                                    <i className="fa-solid fa-bell" />
                                    {pendingCount > 0 && (
                                        <div className="notif-dot" />
                                    )}
                                </div>
                                <div
                                    className="icon-btn"
                                    onClick={() =>
                                        toast("info", "Search coming soon")
                                    }
                                >
                                    <i className="fa-solid fa-magnifying-glass" />
                                </div>
                                <div
                                    style={{
                                        display: "flex",
                                        alignItems: "center",
                                        gap: 8,
                                        padding: "5px 12px",
                                        borderRadius: 9,
                                        background: "rgba(255,255,255,.04)",
                                        border: "1px solid var(--border)",
                                        cursor: "pointer",
                                    }}
                                    onClick={() => setPage("settings")}
                                >
                                    <div
                                        style={{
                                            width: 22,
                                            height: 22,
                                            borderRadius: 6,
                                            background:
                                                "linear-gradient(135deg,#e02441,#1a56db)",
                                            display: "flex",
                                            alignItems: "center",
                                            justifyContent: "center",
                                            fontSize: 9,
                                            fontWeight: 700,
                                            fontFamily: "'Sora',sans-serif",
                                        }}
                                    >
                                        {initials(admin.name)}
                                    </div>
                                    <span
                                        style={{
                                            fontSize: 12,
                                            fontWeight: 600,
                                        }}
                                    >
                                        {admin.name.split(" ")[0]}
                                    </span>
                                    <i
                                        className="fa-solid fa-chevron-down"
                                        style={{
                                            fontSize: 9,
                                            color: "var(--text-lo)",
                                        }}
                                    />
                                </div>
                            </div>
                        </div>

                        {/* MAIN CONTENT */}
                        <div className="main">
                            {loadError && (
                                <div className="table-card" style={{ marginBottom: 16, padding: 18, color: "#fca5a5" }}>
                                    {loadError}
                                </div>
                            )}
                            {loadingDirectory ? (
                                <div style={{ display: "flex", flexDirection: "column", gap: 12 }}>
                                    {[1, 2, 3].map((i) => (
                                        <div
                                            key={i}
                                            className="sp-skeleton"
                                            style={{ height: 80, borderRadius: 12 }}
                                        />
                                    ))}
                                </div>
                            ) : (
                                <>
                                    {page === "dashboard" && (
                                        <DashboardPage
                                            students={students}
                                            universities={universities}
                                            appCount={appCount}
                                            onNavigate={setPage}
                                        />
                                    )}
                                    {page === "pending" && (
                                        <PendingPage
                                            students={students}
                                            universities={universities}
                                            onUpdate={updateVerification}
                                        />
                                    )}
                                    {page === "documents" && <DocumentsPanel />}
                                    {page === "students" && (
                                        <StudentsPage
                                            students={students}
                                            onUpdate={updateVerification}
                                            onDelete={deleteUser}
                                        />
                                    )}
                                    {page === "universities" && (
                                        <UniversitiesPage
                                            universities={universities}
                                            onUpdate={updateVerification}
                                            onDelete={deleteUser}
                                        />
                                    )}
                                    {page === "applications" && <ApplicationsPage />}
                                    {page === "seminars" && <SeminarsAdminPage />}
                                    {page === "certificates" && (
                                        <CertificatesPanel />
                                    )}
                                    {page === "commission" && <CommissionPanel />}
                                    {page === "activity" && <ActivityPage />}
                                    {page === "settings" && (
                                        <SettingsPage
                                            admin={admin}
                                            onLogout={onLogout}
                                        />
                                    )}
                                </>
                            )}
                        </div>
                    </div>
                );
            };

            /* ══════════════════════════════════════════════
   ROOT APP
══════════════════════════════════════════════ */
            const AdminApp = () => {
                const [admin, setAdmin] = useState(null);
                // check for existing session on load so admins aren't forced to
                // re-login if a valid cookie already exists
                useEffect(() => {
                    fetch("../../DATABASE/me.php", { credentials: "include" })
                        .then((r) => r.json())
                        .then((data) => {
                            if (data.success && data.role === "admin") {
                                setAdmin({
                                    name: data.profile?.full_name || data.email,
                                    email: data.email,
                                    role: "admin",
                                });
                            }
                        })
                        .catch(() => {
                            // silently ignore; user will see login page
                        });
                }, []);

                return (
                    <ToastProvider>
                        {!admin ? (
                            <LoginPage onLogin={setAdmin} />
                        ) : (
                            <AdminLayout
                                admin={admin}
                                onLogout={() => setAdmin(null)}
                            />
                        )}
                    </ToastProvider>
                );
            };

            ReactDOM.createRoot(document.getElementById("root")).render(
                <AdminApp />,
            );
        </script>
    </body>
</html>
